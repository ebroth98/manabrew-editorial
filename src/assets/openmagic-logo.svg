<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle O Gradient -->
    <linearGradient id="om-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A866E5"/>
      <stop offset="30%" stop-color="#A866E5"/>
      <stop offset="100%" stop-color="#E5B833"/>
    </linearGradient>

    <!-- More Visible Glow Filter -->
    <filter id="subtle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur" result="faint-blur">
        <feFuncA type="linear" slope="1.0"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="faint-blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background App Icon Shape (Theme Background) -->
  <rect width="512" height="512" rx="112" fill="#121316" />

  <!-- Outer Ring (Portal / Orbit) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4B5563" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="12 12" />

  <!-- Center 'O' 'M' Typography / Logo Mark -->
  <g transform="translate(156, 156)">
    <!-- O: Brand Gradient with subtle glow -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#om-grad)" stroke-width="16" stroke-linecap="round" filter="url(#subtle-glow)" />
    
    <!-- M: Solid Theme Foreground with subtle glow -->
    <path d="M 60 135 L 60 65 L 100 105 L 140 65 L 140 135" 
          fill="none" stroke="#E6E8EC" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#subtle-glow)"/>
  </g>

  <!-- The 5 Mana Orbs (Flat Colors with glow) -->
  <!-- W (White) top -->
  <circle cx="256" cy="76" r="24" fill="#F9FAFB" filter="url(#subtle-glow)" />
  <!-- U (Blue) top right -->
  <circle cx="427" cy="200" r="24" fill="#3B82F6" filter="url(#subtle-glow)" />
  <!-- B (Black) bottom right -->
  <circle cx="362" cy="402" r="24" fill="#374151" filter="url(#subtle-glow)" />
  <!-- R (Red) bottom left -->
  <circle cx="150" cy="402" r="24" fill="#EF4444" filter="url(#subtle-glow)" />
  <!-- G (Green) top left -->
  <circle cx="85" cy="200" r="24" fill="#10B981" filter="url(#subtle-glow)" />
</svg>
