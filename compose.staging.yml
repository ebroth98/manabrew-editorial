# Per-PR preview stack, driven by .github/workflows/preview-deploy.yml.
# Runs under /opt/manabrew-staging, joins the prod docker network. Own
# forge-server so a backend-breaking PR is previewable without touching
# the live relay.
services:
  manabrew-staging:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_RELAY_HOST: relay-staging.manabrew.app
        VITE_RELAY_PORT: "443"
        VITE_RELAY_PASSWORD: ${FORGE_SERVER_KEY:?FORGE_SERVER_KEY is required}
        VITE_MANAGED_RELAY: "1"
        VITE_SCRYFALL_SYMBOL_BASE: /scryfall-symbols/
        # Make the hosted (Java) engine available on staging so the Settings
        # engine toggle shows. Actual use is per-user (preferHostedEngine);
        # default play stays client-side.
        VITE_HOSTED_AI_ENABLED: "true"
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./ops/staging.Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - forge-server-staging

  forge-server-staging:
    build:
      context: .
      dockerfile: forge-engine/crates/forge-server/Dockerfile
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_HEALTH_PORT: "9444"
      FORGE_MAX_ROOMS: "100"
      FORGE_SERVER_KEY: "${FORGE_SERVER_KEY:?FORGE_SERVER_KEY is required}"
      RUST_LOG: "forge_server=info"
    expose:
      - "9443"
      - "9444"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9444/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Hosted Java engine for the staging preview, so the Settings engine toggle
  # has a node to talk to. Its room is `hosted` (unlisted in the lobby).
  self-hosted-node-staging:
    build:
      context: .
      dockerfile: forge-engine/crates/self-hosted-node/Dockerfile
    environment:
      SELF_HOSTED_NODE_RELAY_URL: "ws://forge-server-staging:9443"
      SELF_HOSTED_NODE_SERVER_KEY: "${FORGE_SERVER_KEY:?FORGE_SERVER_KEY is required}"
      SELF_HOSTED_NODE_FORMAT: "${SELF_HOSTED_NODE_FORMAT:-commander}"
      SELF_HOSTED_NODE_MAX_PLAYERS: "${SELF_HOSTED_NODE_MAX_PLAYERS:-2}"
      # Pool size of Java subprocesses; each room runs in its own JVM.
      # Staging box has 3GB RAM, so pool at 1 until we size up.
      SELF_HOSTED_NODE_MAX_GAMES: "${SELF_HOSTED_NODE_MAX_GAMES:-1}"
      RUST_LOG: "self_hosted_node=info"
    depends_on:
      - forge-server-staging
    restart: unless-stopped

networks:
  default:
    external: true
    name: manabrew_default
