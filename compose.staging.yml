# Per-PR preview stack, driven by .github/workflows/preview-deploy.yml.
# Runs under /opt/manabrew-staging, joins the prod docker network. Own
# manabrew-server so a backend-breaking PR is previewable without touching
# the live relay.
#
# Images are built in CI (preview-deploy.yml pushes `pr-<num>` tags to ghcr —
# the staging web image bakes the staging VITE_* args, unlike the release
# `manabrew-web` tags) and pulled here: the box no longer has the disk or CPU
# to build the web image locally, same as production. STAGING_IMAGE_TAG is
# exported by the deploy script.
services:
  manabrew-staging:
    image: ghcr.io/witchesofthehill/manabrew-web:${STAGING_IMAGE_TAG:?STAGING_IMAGE_TAG is required}
    restart: unless-stopped
    environment:
      # Set DESIGN_SYSTEM=1 on the box to expose /design-system on the preview.
      DESIGN_SYSTEM: "${DESIGN_SYSTEM:-}"
    expose:
      - "80"
    volumes:
      - ./ops/staging.Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - manabrew-server-staging

  manabrew-server-staging:
    image: ghcr.io/witchesofthehill/manabrew-server:${STAGING_IMAGE_TAG:?STAGING_IMAGE_TAG is required}
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_HEALTH_PORT: "9444"
      FORGE_MAX_ROOMS: "100"
      MANABREW_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SECRET_MANABREW_KEY: "${SECRET_MANABREW_KEY:-}"
      RUST_LOG: "manabrew_server=info"
    expose:
      - "9443"
      - "9444"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9444/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Hosted Java engine for the staging preview, so the Settings engine toggle
  # has a node to talk to. Its room is `hosted` (unlisted in the lobby).
  self-hosted-node-staging:
    image: ghcr.io/witchesofthehill/manabrew-node:${STAGING_IMAGE_TAG:?STAGING_IMAGE_TAG is required}
    environment:
      SELF_HOSTED_NODE_RELAY_URL: "ws://manabrew-server-staging:9443"
      SELF_HOSTED_NODE_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SELF_HOSTED_NODE_FORMAT: "${SELF_HOSTED_NODE_FORMAT:-commander}"
      SELF_HOSTED_NODE_MAX_PLAYERS: "${SELF_HOSTED_NODE_MAX_PLAYERS:-2}"
      # Pool size of Java subprocesses; each room runs in its own JVM.
      # Staging box has 3GB RAM, so pool at 1 until we size up.
      SELF_HOSTED_NODE_MAX_GAMES: "${SELF_HOSTED_NODE_MAX_GAMES:-1}"
      RUST_LOG: "self_hosted_node=info"
    depends_on:
      - manabrew-server-staging
    restart: unless-stopped

networks:
  default:
    external: true
    name: manabrew_default
