# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Required for window.crossOriginIsolated (SharedArrayBuffer + Atomics.wait
    # used by the WASM game-engine worker). Set at the origin so the app works
    # even when no reverse proxy injects them.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # SPA fallback for client-side router deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WASM + card data bundles — serve files directly, no SPA fallback
    # (so a missing file returns 404 instead of index.html)
    location /wasm/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri =404;
    }

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        try_files $uri =404;
    }
}
