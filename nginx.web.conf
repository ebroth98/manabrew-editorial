# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Default for documents and most assets.
    #
    # - COOP same-origin + COEP credentialless enables window.crossOriginIsolated
    #   (required for SharedArrayBuffer + Atomics.wait in the WASM worker).
    # - credentialless lets cross-origin subresources (Scryfall card art,
    #   third-party fonts, etc.) load without each requiring an explicit
    #   Cross-Origin-Resource-Policy header.
    # - CORP same-origin marks our own resources so they satisfy require-corp
    #   contexts (the module worker below) when fetched.
    add_header Cross-Origin-Opener-Policy   "same-origin"    always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin"    always;

    # SPA fallback for client-side router deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ES module workers must have COEP: require-corp specifically (Chrome
    # enforces this for any module worker that uses SharedArrayBuffer,
    # regardless of the embedding document's COEP mode). All subresources
    # the worker fetches are same-origin and carry CORP: same-origin above,
    # so require-corp is satisfied.
    location ~* \.worker[.-][^/]+\.js$ {
        access_log off;
        expires 1y;
        add_header Cache-Control                "public, immutable" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"       always;
        add_header Cross-Origin-Embedder-Policy "require-corp"      always;
        add_header Cross-Origin-Resource-Policy "same-origin"       always;
        try_files $uri =404;
    }

    # WASM + cardset archive — serve files directly, no SPA fallback
    location /wasm/ {
        add_header Cross-Origin-Opener-Policy   "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "same-origin"    always;
        try_files $uri =404;
    }

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control                "public, immutable" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"       always;
        add_header Cross-Origin-Embedder-Policy "credentialless"    always;
        add_header Cross-Origin-Resource-Policy "same-origin"       always;
        try_files $uri =404;
    }

    # Proxy Scryfall mana-symbol SVGs through our own origin so the client
    # can fetch() them. svgs.scryfall.io doesn't send Access-Control-Allow-
    # Origin, which blocks cross-origin fetch() (card art works because it
    # uses <img>, which doesn't need CORS for display).
    location /scryfall-symbols/ {
        # Use rewrite + literal proxy_pass (not a variable) so nginx
        # actually substitutes the URI: /scryfall-symbols/G.svg →
        # https://svgs.scryfall.io/card-symbols/G.svg. A variable in
        # proxy_pass disables nginx's location-prefix rewrite, sending
        # the original path verbatim and 404'ing.
        rewrite ^/scryfall-symbols/(.*)$ /card-symbols/$1 break;
        proxy_pass https://svgs.scryfall.io;
        proxy_ssl_server_name on;
        proxy_ssl_name svgs.scryfall.io;
        proxy_set_header Host svgs.scryfall.io;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_hide_header Cache-Control;
        # No `always` on Cache-Control: nginx only adds it to 2xx/3xx, so a
        # transient upstream error (e.g. a misconfigured proxy regressing to
        # 404) doesn't get pinned in browsers for a week.
        add_header Cache-Control                "public, max-age=604800";
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }
}
