apiVersion: 1

groups:
  - orgId: 1
    name: manabrew-ops
    folder: Manabrew
    interval: 1m
    rules:
      - uid: relay-down
        title: relay down
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          summary: relay /metrics target is unreachable
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job="relay"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params: [1]

      - uid: node-fleet-silent
        isPaused: true
        title: node fleet silent
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: critical
        annotations:
          summary: a self-hosted node has not pushed metrics for 15+ minutes
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: time() - push_time_seconds{job="self-hosted-node"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [900]

      - uid: node-rooms-below-expected
        isPaused: true
        title: hosted rooms below expected
        condition: C
        for: 10m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: fewer hosted rooms than expected are live
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(manabrew_node_rooms_hosted)
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params: [1]

      - uid: engine-error-spike
        title: engine error spike
        condition: C
        for: 0s
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: hosted engine errors are spiking
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(manabrew_node_engine_errors_total[10m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [1]

      - uid: outdated-wire-burst
        title: outdated client burst
        condition: C
        for: 0s
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: wave of outdated-client rejections (bad release or stale clients)
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(manabrew_relay_client_rejections_total{reason="outdated_wire"}[15m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [5]

      - uid: node-session-wedged
        title: node engine session wedged
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: a node has had a game session active nonstop for 3+ hours — wedged or leaked engine
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: min_over_time(manabrew_node_games_active[3h])
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]

      - uid: abandoned-game-spike
        title: abandoned game spike
        condition: C
        for: 0s
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: in-game rooms repeatedly reset with no connected humans — zombie-room signature
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(manabrew_relay_games_ended_total{reason="abandoned"}[30m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [4]

      - uid: traffic-cliff
        title: traffic cliff (EU daytime)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: zero human connections for 30+ minutes during 08:00-20:00 UTC
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(max_over_time(manabrew_relay_connections{kind="human"}[30m])) + clamp_max((hour() < bool 8) + (hour() >= bool 20), 1) * 100
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params: [1]

      - uid: stuck-room-suspected
        title: stuck room suspected
        condition: C
        for: 15m
        noDataState: OK
        execErrState: OK
        labels:
          severity: warning
        annotations:
          summary: abandoned in-game rooms reaped well above baseline — a hosted node is likely serving a wedged room players cannot start
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(manabrew_relay_games_ended_total{reason="abandoned"}[2h]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [6]
