global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: relay
    static_configs:
      - targets: ["manabrew-server:9444"]

  # honor_labels keeps the job/instance labels pushed by remote nodes
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
