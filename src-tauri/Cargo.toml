[package]
name = "forge-web"
version = "0.0.0"
edition = "2021"

[lib]
name = "forge_web_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
forge-engine-core = { path = "../forge-engine/crates/forge-engine" }
forge-foundation = { path = "../forge-engine/crates/forge-foundation" }
forge-carddb = { path = "../forge-engine/crates/forge-carddb" }
rand = "0.8"
tokio = { version = "1", features = ["rt", "sync", "macros"] }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
forge-server = { path = "../forge-engine/crates/forge-server" }
forge-agent-interface = { path = "../forge-engine/crates/forge-agent-interface" }
