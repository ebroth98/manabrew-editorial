[package]
name = "forge-web"
version = "0.0.0"
edition = "2021"

[lib]
name = "forge_web_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
forge-engine-core = { path = "../forge-engine/crates/forge-engine" }
forge-foundation = { path = "../forge-engine/crates/forge-foundation" }
rand = "0.8"
