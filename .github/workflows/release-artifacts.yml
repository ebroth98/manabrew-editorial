name: Release artifacts

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Build macOS .dmg"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows .exe / .msi"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: decide which platforms to build ──────────────────────────
  # Precedence:
  #   1. workflow_dispatch  -> honour the boolean inputs.
  #   2. Tag push (v*)      -> build both (release needs both artifacts).
  #   3. Push to main       -> read the PR body checkboxes.
  gate:
    name: Check build gate
    runs-on: [self-hosted, artifactGate]
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_build_macos: ${{ steps.check.outputs.should_build_macos }}
      should_build_windows: ${{ steps.check.outputs.should_build_windows }}
    steps:
      - name: Evaluate gate
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, ref, sha } = context;

            if (eventName === 'workflow_dispatch') {
              const inputs = context.payload.inputs ?? {};
              const mac = String(inputs.build_macos   ?? 'true') === 'true';
              const win = String(inputs.build_windows ?? 'true') === 'true';
              core.info(`workflow_dispatch; mac=${mac} win=${win}`);
              core.setOutput('should_build_macos',   mac ? 'true' : 'false');
              core.setOutput('should_build_windows', win ? 'true' : 'false');
              return;
            }

            if (ref.startsWith('refs/tags/v')) {
              core.info(`Tag push ${ref}; building both platforms.`);
              core.setOutput('should_build_macos',   'true');
              core.setOutput('should_build_windows', 'true');
              return;
            }

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = prs[0];
            if (!pr) {
              core.info(`No PR found for commit ${sha}; skipping builds.`);
              core.setOutput('should_build_macos',   'false');
              core.setOutput('should_build_windows', 'false');
              return;
            }
            const body = pr.body ?? '';
            const mac = /^\s*-\s*\[x\]\s*Build macOS \.dmg/im.test(body);
            const win = /^\s*-\s*\[x\]\s*Build Windows \.exe/im.test(body);
            core.info(`PR #${pr.number} mac=${mac} win=${win}`);
            core.setOutput('should_build_macos',   mac ? 'true' : 'false');
            core.setOutput('should_build_windows', win ? 'true' : 'false');

  # ── macOS .dmg ─────────────────────────────────────────────────────
  macos-dmg:
    name: Build macOS .dmg
    needs: gate
    if: needs.gate.outputs.should_build_macos == 'true'
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - run: yarn

      - name: Build WASM + bundle cards
        run: npm run build:wasm

      - name: Tauri build (macOS)
        run: npm run tauri -- build

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 2000-char single-message limit.
      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          ZERO_SHA='0000000000000000000000000000000000000000'
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO_SHA" ] && git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            RANGE="${BEFORE}..${AFTER}"
          else
            RANGE="${AFTER}~5..${AFTER}"
          fi
          LOG=$(git log --pretty=format:'- %s (%h, %an)' "$RANGE" 2>/dev/null || echo '')
          if [ -z "$LOG" ]; then
            LOG=$(git log --pretty=format:'- %s (%h, %an)' -n 5 "$AFTER" 2>/dev/null || echo '')
          fi
          MAX=1500
          if [ "${#LOG}" -gt "$MAX" ]; then
            LOG="${LOG:0:$MAX}"$'\n'"… (truncated)"
          fi
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      # Fan out to n8n → Discord so subscribers see the new .dmg without
      # having to watch the Actions tab. URL points at the workflow run
      # page because Actions artifacts are not publicly downloadable.
      - name: Notify n8n (macOS artifact)
        if: ${{ success() }}
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_DEPLOY_WEBHOOK_URL }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        shell: bash
        run: |
          if [ -z "${N8N_WEBHOOK_URL:-}" ]; then
            echo "N8N_DEPLOY_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg event     "artifact" \
            --arg platform  "macos" \
            --arg name      "macos-dmg-${{ github.sha }}" \
            --arg url       "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha       "${{ github.sha }}" \
            --arg ref       "${{ github.ref }}" \
            --arg repo      "${{ github.repository }}" \
            --arg actor     "${{ github.actor }}" \
            --arg changelog "$CHANGELOG" \
            '{event:$event, platform:$platform, name:$name, url:$url, sha:$sha, ref:$ref, repo:$repo, actor:$actor, changelog:$changelog}')
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$N8N_WEBHOOK_URL"

  # ── Windows .exe ───────────────────────────────────────────────────
  # NOTE: requires a self-hosted runner with the `windows` label
  # (Rust + MSVC toolchain + Node + Yarn installed).
  windows-exe:
    name: Build Windows .exe
    needs: gate
    if: needs.gate.outputs.should_build_windows == 'true'
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      # Loads MSVC env (link.exe, LIB, INCLUDE) for subsequent steps so
      # Rust/Tauri can link. Replaces the need for a persistent
      # Developer Command Prompt.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # Runner prerequisites (set up once on the machine via
      # scripts/setup-windows-runner.ps1):
      #   - Rust + rustup installed, %USERPROFILE%\.cargo\bin on SYSTEM PATH
      #   - wasm32-unknown-unknown target + wasm-pack installed
      #   - Runner service runs as .\Administrator (service account needs
      #     read access to .cargo\bin, which NetworkService does not have)
      - run: yarn

      - name: Build WASM + bundle cards
        run: npm run build:wasm

      - name: Tauri build (Windows)
        run: npm run tauri -- build

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          # NSIS produces the self-installing .exe, WiX produces the .msi.
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 2000-char single-message limit.
      - name: Build changelog
        id: changelog
        shell: pwsh
        run: |
          $before = '${{ github.event.before }}'
          $after  = '${{ github.sha }}'
          $zero   = '0000000000000000000000000000000000000000'
          $hasBefore = $before -and $before -ne $zero
          if ($hasBefore) {
            git rev-parse --verify --quiet "$before^{commit}" 2>$null | Out-Null
            if ($LASTEXITCODE -ne 0) { $hasBefore = $false }
          }
          if ($hasBefore) {
            $range = "$before..$after"
          } else {
            $range = "$after~5..$after"
          }
          $raw = git log --pretty=format:"- %s (%h, %an)" $range 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $raw) {
            $raw = git log --pretty=format:"- %s (%h, %an)" -n 5 $after 2>$null
          }
          $log = if ($raw) { ($raw -join "`n") } else { '' }
          $max = 1500
          if ($log.Length -gt $max) {
            $log = $log.Substring(0, $max) + "`n… (truncated)"
          }
          "changelog<<CHANGELOG_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $log | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "CHANGELOG_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $global:LASTEXITCODE = 0
          exit 0

      # Fan out to n8n → Discord so subscribers see the new .exe without
      # having to watch the Actions tab. URL points at the workflow run
      # page because Actions artifacts are not publicly downloadable.
      - name: Notify n8n (Windows artifact)
        if: ${{ success() }}
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_DEPLOY_WEBHOOK_URL }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:N8N_WEBHOOK_URL)) {
            Write-Host "N8N_DEPLOY_WEBHOOK_URL not set; skipping notification."
            exit 0
          }
          $payload = @{
            event     = 'artifact'
            platform  = 'windows'
            name      = 'windows-exe-${{ github.sha }}'
            url       = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            sha       = '${{ github.sha }}'
            ref       = '${{ github.ref }}'
            repo      = '${{ github.repository }}'
            actor     = '${{ github.actor }}'
            changelog = $env:CHANGELOG
          } | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri $env:N8N_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload

  # ── Publish GitHub Release (tags only) ─────────────────────────────
  # Triggered only on `v*` tag pushes. Downloads the artifacts built
  # above, generates a changelog from commits since the previous tag,
  # and publishes a GitHub Release with the bundles attached.
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-dmg, windows-exe]
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          path: release-assets/windows

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## Features",      "labels": ["feat", "feature"] },
                { "title": "## Fixes",         "labels": ["fix", "bug"] },
                { "title": "## Changes",       "labels": [] }
              ],
              "label_extractor": [
                { "pattern": "^(feat|fix|chore|docs|refactor|perf|test|ci)(\\(.+\\))?!?:.+", "target": "$1", "on_property": "title" }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/macos/*.dmg
            release-assets/windows/*.exe
            release-assets/windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Notify n8n so it can fan out to Discord (same endpoint deploy.sh
      # uses). Requires repo secret N8N_DEPLOY_WEBHOOK_URL pointing at
      # the n8n `/webhook/github-deploy` endpoint. Skipped silently if
      # the secret is unset. Payload carries an `event: "release"` tag
      # so the n8n workflow can branch on it (add a filter for
      # `$json.body.event === "release"` alongside the existing main-branch
      # check).
      - name: Notify n8n (release published)
        if: steps.publish.outputs.url != ''
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_DEPLOY_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.publish.outputs.url }}
          RELEASE_BODY: ${{ steps.changelog.outputs.changelog }}
          RELEASE_ACTOR: ${{ github.actor }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_PRERELEASE: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        run: |
          if [ -z "${N8N_WEBHOOK_URL:-}" ]; then
            echo "N8N_DEPLOY_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg event      "release" \
            --arg tag        "$RELEASE_TAG" \
            --arg url        "$RELEASE_URL" \
            --arg body       "$RELEASE_BODY" \
            --arg actor      "$RELEASE_ACTOR" \
            --arg sha        "$RELEASE_SHA" \
            --arg repo       "$RELEASE_REPO" \
            --argjson prerelease "$RELEASE_PRERELEASE" \
            '{event: $event, tag: $tag, url: $url, body: $body, actor: $actor, sha: $sha, repo: $repo, prerelease: $prerelease}')
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$N8N_WEBHOOK_URL"
