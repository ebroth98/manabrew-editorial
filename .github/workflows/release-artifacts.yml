name: Release artifacts

# Builds the Tauri desktop installers (macOS .dmg, Windows .exe / .msi) on
# GitHub-hosted runners and posts a joyful Discord embed when each is ready.
# Native installers — Wasm/web stack lives in .github/workflows/deploy.yml.
#
# GitHub-hosted runners are free for public repositories (unlimited minutes
# on standard ubuntu-latest / windows-latest / macos-latest). The previous
# revision used self-hosted runners; migrating off them lets us drop the
# manual provisioning step (scripts/setup-{linux,windows}-runner.{sh,ps1}
# are still kept around for the parity dashboard host).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Build macOS .dmg"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows .exe / .msi"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: decide which platforms to build ──────────────────────────
  # Precedence:
  #   1. workflow_dispatch  -> honour the boolean inputs.
  #   2. Tag push (v*)      -> build both (release needs both artifacts).
  #   3. Push to main       -> read the PR body checkboxes.
  gate:
    name: Check build gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_build_macos: ${{ steps.check.outputs.should_build_macos }}
      should_build_windows: ${{ steps.check.outputs.should_build_windows }}
    steps:
      - name: Evaluate gate
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, ref, sha } = context;

            if (eventName === 'workflow_dispatch') {
              const inputs = context.payload.inputs ?? {};
              const mac = String(inputs.build_macos   ?? 'true') === 'true';
              const win = String(inputs.build_windows ?? 'true') === 'true';
              core.info(`workflow_dispatch; mac=${mac} win=${win}`);
              core.setOutput('should_build_macos',   mac ? 'true' : 'false');
              core.setOutput('should_build_windows', win ? 'true' : 'false');
              return;
            }

            if (ref.startsWith('refs/tags/v')) {
              core.info(`Tag push ${ref}; building both platforms.`);
              core.setOutput('should_build_macos',   'true');
              core.setOutput('should_build_windows', 'true');
              return;
            }

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = prs[0];
            if (!pr) {
              core.info(`No PR found for commit ${sha}; skipping builds.`);
              core.setOutput('should_build_macos',   'false');
              core.setOutput('should_build_windows', 'false');
              return;
            }
            const body = pr.body ?? '';
            const mac = /^\s*-\s*\[x\]\s*Build macOS \.dmg/im.test(body);
            const win = /^\s*-\s*\[x\]\s*Build Windows \.exe/im.test(body);
            core.info(`PR #${pr.number} mac=${mac} win=${win}`);
            core.setOutput('should_build_macos',   mac ? 'true' : 'false');
            core.setOutput('should_build_windows', win ? 'true' : 'false');

  # ── macOS .dmg ─────────────────────────────────────────────────────
  # macos-latest = Apple Silicon (arm64). Produces an arm64 .dmg. If you
  # ever need Intel too, add an `arch: [arm64, x86_64]` matrix and pass
  # `--target` to `tauri build`.
  macos-dmg:
    name: Build macOS .dmg
    needs: gate
    if: needs.gate.outputs.should_build_macos == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-macos

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin to the same version Dockerfile.web uses. `version: latest`
          # fetches v0.15.0+, which jetli/wasm-pack-action's platform-mapper
          # doesn't recognise on Windows ("Unsupported platform: x64").
          version: "v0.13.1"

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Tauri build (macOS)
        run: yarn tauri -- build

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 4096-char embed-description limit.
      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          ZERO_SHA='0000000000000000000000000000000000000000'
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO_SHA" ] && git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            RANGE="${BEFORE}..${AFTER}"
          else
            RANGE="${AFTER}~5..${AFTER}"
          fi
          LOG=$(git log --pretty=format:'- %s (%h, %an)' "$RANGE" 2>/dev/null || echo '')
          if [ -z "$LOG" ]; then
            LOG=$(git log --pretty=format:'- %s (%h, %an)' -n 5 "$AFTER" 2>/dev/null || echo '')
          fi
          MAX=1500
          if [ "${#LOG}" -gt "$MAX" ]; then
            LOG="${LOG:0:$MAX}"$'\n'"… (truncated)"
          fi
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Discord embed (macOS artifact)
        if: ${{ success() }}
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          ARTIFACT_NAME: macos-dmg-${{ github.sha }}
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"
          TITLE="🍎 macOS build ready"
          COLOR=5793266   # 0x5865F2 blurple

          DESC=$(printf '%s\n\n%s\n\n%s\n%s' \
            "🧪 Fresh \`.dmg\` artifact attached to the workflow run." \
            "📦 [Download \`${ARTIFACT_NAME}\` from the workflow run](${RUN_URL}) (sign-in required, 30-day retention)." \
            "📝 **Changelog**" \
            "${CHANGELOG}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see workflow run for full log)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RUN_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          curl -fsS -X POST \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages"

  # ── Windows .exe ───────────────────────────────────────────────────
  # windows-latest is x86_64. NSIS + WiX (.msi) ship preinstalled on the
  # runner image. MSVC env is loaded per-step via ilammy/msvc-dev-cmd.
  windows-exe:
    name: Build Windows .exe
    needs: gate
    if: needs.gate.outputs.should_build_windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-windows

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin to the same version Dockerfile.web uses. `version: latest`
          # fetches v0.15.0+, which jetli/wasm-pack-action's platform-mapper
          # doesn't recognise on Windows ("Unsupported platform: x64").
          version: "v0.13.1"

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Tauri build (Windows)
        run: yarn tauri -- build

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          # NSIS produces the self-installing .exe, WiX produces the .msi.
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 4096-char embed-description limit.
      - name: Build changelog
        id: changelog
        shell: pwsh
        run: |
          $before = '${{ github.event.before }}'
          $after  = '${{ github.sha }}'
          $zero   = '0000000000000000000000000000000000000000'
          $hasBefore = $before -and $before -ne $zero
          if ($hasBefore) {
            git rev-parse --verify --quiet "$before^{commit}" 2>$null | Out-Null
            if ($LASTEXITCODE -ne 0) { $hasBefore = $false }
          }
          if ($hasBefore) {
            $range = "$before..$after"
          } else {
            $range = "$after~5..$after"
          }
          $raw = git log --pretty=format:"- %s (%h, %an)" $range 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $raw) {
            $raw = git log --pretty=format:"- %s (%h, %an)" -n 5 $after 2>$null
          }
          $log = if ($raw) { ($raw -join "`n") } else { '' }
          $max = 1500
          if ($log.Length -gt $max) {
            $log = $log.Substring(0, $max) + "`n… (truncated)"
          }
          "changelog<<CHANGELOG_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $log | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "CHANGELOG_EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $global:LASTEXITCODE = 0
          exit 0

      - name: Post Discord embed (Windows artifact)
        if: ${{ success() }}
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          ARTIFACT_NAME: windows-exe-${{ github.sha }}
        # Git for Windows ships bash + jq + curl on the runner image, so the
        # same bash block we use on macOS works here too.
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"
          TITLE="🪟 Windows build ready"
          COLOR=5793266   # 0x5865F2 blurple

          DESC=$(printf '%s\n\n%s\n\n%s\n%s' \
            "🧪 Fresh \`.exe\` + \`.msi\` artifact attached to the workflow run." \
            "📦 [Download \`${ARTIFACT_NAME}\` from the workflow run](${RUN_URL}) (sign-in required, 30-day retention)." \
            "📝 **Changelog**" \
            "${CHANGELOG}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see workflow run for full log)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RUN_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          curl -fsS -X POST \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages"

  # ── Publish GitHub Release (tags only) ─────────────────────────────
  # Triggered only on `v*` tag pushes. Downloads the artifacts built
  # above, generates a changelog from commits since the previous tag,
  # and publishes a GitHub Release with the bundles attached.
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos-dmg, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          path: release-assets/windows

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "## Features",      "labels": ["feat", "feature"] },
                { "title": "## Fixes",         "labels": ["fix", "bug"] },
                { "title": "## Changes",       "labels": [] }
              ],
              "label_extractor": [
                { "pattern": "^(feat|fix|chore|docs|refactor|perf|test|ci)(\\(.+\\))?!?:.+", "target": "$1", "on_property": "title" }
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/macos/*.dmg
            release-assets/windows/*.exe
            release-assets/windows/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Discord embed (release published)
        if: steps.publish.outputs.url != ''
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.publish.outputs.url }}
          RELEASE_BODY: ${{ steps.changelog.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"

          if [ "$PRERELEASE" = "true" ]; then
            TITLE="🧪 manabrew ${RELEASE_TAG} (pre-release)"
            COLOR=16753920   # 0xFFA500 orange
          else
            TITLE="🎁 manabrew ${RELEASE_TAG} released"
            COLOR=5763719    # 0x57F287 green
          fi

          DESC=$(printf '%s\n\n%s\n%s' \
            "📥 Public download (no GitHub account needed): ${RELEASE_URL}" \
            "📝 **Changelog**" \
            "${RELEASE_BODY}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see release page for full notes)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RELEASE_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          curl -fsS -X POST \
            -H "Authorization: Bot $BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages"
