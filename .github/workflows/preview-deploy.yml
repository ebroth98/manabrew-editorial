name: Preview deploy

# PRs labelled `deploy-preview` are deployed to staging.manabrew.app.
# Closing the PR or removing the label tears the preview down.
#
# The staging box can no longer build images (same reason production
# switched to pulling: the web image is a ~1h WASM+Vite build that doesn't
# fit the host), so CI builds the three staging images here and pushes them
# to ghcr as `pr-<num>` tags; the box only pulls. The web image bakes the
# staging VITE_* args (relay-staging host + the relay password from the
# MANABREW_SERVER_KEY secret), so its `pr-*` tags are staging-flavored —
# don't reuse them elsewhere. Layer caches share docker-images.yml's scopes,
# so the release builds' dependency layers are reused here and vice versa.
#
# Fork PRs are skipped: they get neither a package-write token nor the SSH
# secrets.
on:
  pull_request:
    types: [labeled, synchronize, reopened, closed, unlabeled]

concurrency:
  group: preview-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build & push ${{ matrix.image }} (pr tag)
    if: |
      github.event.pull_request.head.repo.full_name == github.repository
      && ((github.event.action == 'labeled' && github.event.label.name == 'deploy-preview')
          || (contains(fromJSON('["synchronize","reopened"]'), github.event.action)
              && contains(github.event.pull_request.labels.*.name, 'deploy-preview')))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: manabrew-server
            dockerfile: manabrew-rs/crates/manabrew-server/Dockerfile
          - image: manabrew-web
            dockerfile: Dockerfile.web
          - image: manabrew-node
            dockerfile: manabrew-rs/crates/self-hosted-node/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Staging build args mirror what compose.staging.yml used to bake on
      # the box. Only the web image is configured at build time; the relay
      # and node take everything via runtime env from the compose file.
      - name: Staging build args (web only)
        id: args
        run: |
          if [ "${{ matrix.image }}" = "manabrew-web" ]; then
            {
              echo 'build_args<<ARGS_EOF'
              echo 'VITE_RELAY_HOST=relay-staging.manabrew.app'
              echo 'VITE_RELAY_PORT=443'
              echo 'VITE_RELAY_PASSWORD=${{ secrets.MANABREW_SERVER_KEY }}'
              echo 'VITE_MANAGED_RELAY=1'
              echo 'VITE_SCRYFALL_SYMBOL_BASE=/scryfall-symbols/'
              echo 'VITE_HOSTED_AI_ENABLED=true'
              echo 'ARGS_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo 'build_args=' >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:pr-${{ github.event.pull_request.number }}
          build-args: ${{ steps.args.outputs.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: SSH and roll out PR preview
        id: deploy
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          STAGING_PATH: ${{ secrets.DEPLOY_STAGING_PATH }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          # PR refs live on the base repo, so always clone that (works for forks too).
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              "$USER@$HOST" bash <<REMOTE_EOF
          set -euo pipefail
          STAGING="${STAGING_PATH:-/opt/manabrew-staging}"

          if [ ! -d "\$STAGING/.git" ]; then
              git clone https://github.com/${BASE_REPO}.git "\$STAGING"
          fi
          cd "\$STAGING"

          # Reuse prod's MANABREW_SERVER_KEY (symlink follows rotations).
          [ -L .env ] || ln -sf "${DEPLOY_PATH}/ops/production.secrets" .env

          # The checkout only feeds compose.staging.yml + ops/ configs now —
          # images come prebuilt from ghcr, so no submodules and no build.
          git fetch origin "pull/${PR_NUMBER}/head" --force
          git checkout --detach --force ${PR_SHA}

          # A branch cut before the pulled-image staging stack still has the
          # old build:-based compose — \`up\` would silently rebuild the web
          # image ON THE BOX (the exact thing this workflow exists to avoid,
          # and a disk-filler). Fail fast instead; --no-build below is the
          # backstop.
          if ! grep -q 'STAGING_IMAGE_TAG' compose.staging.yml; then
              echo "❌ compose.staging.yml on this branch predates the pulled-image staging stack."
              echo "   Merge main into the PR branch and push — the preview will re-run."
              exit 1
          fi

          export STAGING_IMAGE_TAG="pr-${PR_NUMBER}"
          docker compose -p manabrew-staging -f compose.staging.yml pull --quiet
          docker compose -p manabrew-staging -f compose.staging.yml up -d --no-build --remove-orphans
          # Record which PR owns the single slot so another PR's teardown
          # doesn't kill this preview.
          echo "${PR_NUMBER}" > "\$STAGING/.preview-pr"
          REMOTE_EOF

      - name: Comment preview URL
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        with:
          script: |
            const ok = process.env.DEPLOY_OUTCOME === 'success';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: ok
                ? `🚀 Preview deployed: https://staging.manabrew.app (${sha})`
                : `💥 Preview deploy failed for ${sha} — see [run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            });

      - name: Fail job if deploy failed
        if: steps.deploy.outcome != 'success'
        run: exit 1

  teardown:
    # Closing the PR, or removing the deploy-preview label. The pr-<num>
    # image tags are left on ghcr (deleting package versions needs an admin
    # token); they're overwritten on the next preview of the same PR.
    if: |
      github.event.action == 'closed'
      || (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH and tear down preview (only if this PR owns the slot)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          STAGING_PATH: ${{ secrets.DEPLOY_STAGING_PATH }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$USER@$HOST" bash <<REMOTE_EOF
          set -euo pipefail
          STAGING="${STAGING_PATH:-/opt/manabrew-staging}"
          [ -d "\$STAGING" ] || { echo "no staging dir; nothing to tear down"; exit 0; }
          cd "\$STAGING"

          OWNER="\$(cat .preview-pr 2>/dev/null || echo '')"
          if [ "\$OWNER" != "${PR_NUMBER}" ]; then
              echo "slot owned by PR \${OWNER:-none}, not ${PR_NUMBER}; leaving it up"
              exit 0
          fi
          export STAGING_IMAGE_TAG="pr-${PR_NUMBER}"
          docker compose -p manabrew-staging -f compose.staging.yml down --remove-orphans
          rm -f .preview-pr
          echo "torn down preview for PR ${PR_NUMBER}"
          REMOTE_EOF
