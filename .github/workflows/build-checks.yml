name: Build checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript type-check ──────────────────────────────────────────
  typescript:
    name: TypeScript & Wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          path: typescript
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - run: yarn
      - run: yarn build:wasm

      - name: Type-check
        run: yarn tsc -p tsconfig.app.json --noEmit

  # ── Rust workspace (engine, CLI, agent-interface) ──────────────────
  rust-engine:
    name: Rust engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-engine
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-engine
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build engine crates (release)
        run: >
          cargo build --release
          -p forge-foundation
          -p forge-carddb
          -p forge-engine-core
          -p forge-agent-interface

      - name: Run engine tests (release)
        run: cargo test --release -p forge-engine-core --lib

  # ── Rust server ────────────────────────────────────────────────────
  rust-server:
    name: Rust server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-server
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-server
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build forge-server (release)
        run: cargo build --release -p forge-server

  # ── Rust parity dashboard ─────────────────────────────────────────
  rust-parity:
    name: Rust parity dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-parity
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-parity
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build forge-parity (with serve feature, release)
        run: cargo build --release -p forge-parity --features serve

  # ── Full web build (wasm + tsc + vite) ─────────────────────────────
  web-build:
    name: Web build (full)
    runs-on: ubuntu-latest
    needs: [typescript]
    defaults:
      run:
        working-directory: web-build
    steps:
      - uses: actions/checkout@v4
        with:
          path: web-build
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - run: yarn

      - name: Build web (wasm + tsc + vite)
        run: yarn build:web

  # ── JSON lint (preset decks) ───────────────────────────────────────
  json-lint:
    name: JSON lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: json-lint
    steps:
      - uses: actions/checkout@v4
        with:
          path: json-lint

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate preset deck JSON files
        run: |
          EXIT=0
          for f in public/preset_decks/*.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in $f"
              EXIT=1
            fi
          done
          exit $EXIT
