name: Build checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changed files
    runs-on: ubuntu-latest
    outputs:
      run_checks: ${{ steps.scope.outputs.run_checks }}
      run_forge_room: ${{ steps.scope.outputs.run_forge_room }}
    steps:
      - name: Detect website-only PR
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            // The GraalVM + forge-room build is slow (native-image), so only run
            // it when a file in the harness → native-lib → tauri link chain moves.
            const FORGE_ROOM_PATHS = [
              'forge/',
              'forge-harness/',
              'src-tauri/',
              'manabrew-rs/crates/self-hosted-node/',
              'scripts/harness.mjs',
              '.github/workflows/build-checks.yml',
            ];

            if (context.eventName !== 'pull_request') {
              core.setOutput('run_checks', 'true');
              core.setOutput('run_forge_room', 'true');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const websiteOnly = files.length > 0 && files.every((file) => file.filename.startsWith('website/'));
            core.setOutput('run_checks', websiteOnly ? 'false' : 'true');
            const forgeRoom = files.some((file) =>
              FORGE_ROOM_PATHS.some((prefix) => file.filename.startsWith(prefix)),
            );
            core.setOutput('run_forge_room', forgeRoom ? 'true' : 'false');

  # ── TypeScript type-check ──────────────────────────────────────────
  typescript:
    name: TypeScript & Wasm
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          path: typescript
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn
      - run: yarn build:wasm

      - name: Type-check
        run: yarn typecheck

  # ── Rust workspace (engine, CLI, agent-interface) ──────────────────
  rust-engine:
    name: Rust engine
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: rust-engine
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-engine
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build engine crates (release)
        run: >
          cargo build --release
          -p forge-foundation
          -p forge-carddb
          -p manabrew-engine
          -p manabrew-agent-interface

      - name: Run engine tests (release)
        run: cargo test --release -pmanabrew-engine  --lib

  # ── Rust server ────────────────────────────────────────────────────
  rust-server:
    name: Rust server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: rust-server
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-server
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build manabrew-server (release)
        run: cargo build --release -p manabrew-server

  # ── Rust parity dashboard ─────────────────────────────────────────
  rust-parity:
    name: Rust parity dashboard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: rust-parity
    steps:
      - uses: actions/checkout@v4
        with:
          path: rust-parity
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build parity (with serve feature, release)
        run: cargo build --release -p parity --features serve

  # ── Full web build (wasm + tsc + vite) ─────────────────────────────
  web-build:
    name: Web build (full)
    runs-on: ubuntu-latest
    needs: [changes, typescript]
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: web-build
    steps:
      - uses: actions/checkout@v4
        with:
          path: web-build
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build web (wasm + tsc + vite)
        run: yarn build:web

  # ── JSON lint (preset decks) ───────────────────────────────────────
  json-lint:
    name: JSON lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    defaults:
      run:
        working-directory: json-lint
    steps:
      - uses: actions/checkout@v4
        with:
          path: json-lint

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate preset deck JSON files
        run: |
          EXIT=0
          for f in public/preset_decks/*.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in $f"
              EXIT=1
            fi
          done
          exit $EXIT

  forge-room-graalvm-windows:
    name: GraalVM build (Windows)
    runs-on: windows-latest
    if: contains(github.event.pull_request.labels.*.name, 'ci:test-desktop')
    timeout-minutes: 90
    defaults:
      run:
        working-directory: forge-room
    steps:
      - uses: actions/checkout@v4
        with:
          path: forge-room
          submodules: recursive
          clean: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: forge-room

      - run: yarn

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.ps1
        shell: pwsh

      - name: Stub frontend dist for tauri context macro
        shell: bash
        run: |
          mkdir -p dist
          printf '<!doctype html><title>ci</title>' > dist/index.html

      - name: Build tauri crate with forge-room feature
        run: cargo build --release -p manabrew --features forge-room

  forge-room-graalvm-macos:
    name: GraalVM build (macOS)
    runs-on: macos-latest
    if: contains(github.event.pull_request.labels.*.name, 'ci:test-desktop')
    timeout-minutes: 90
    defaults:
      run:
        working-directory: forge-room
    steps:
      - uses: actions/checkout@v4
        with:
          path: forge-room
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: forge-room

      - run: yarn

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.sh

      # `cargo build` of the tauri crate runs `generate_context!`, which embeds
      # `frontendDist` (../dist). Stub it so the link test doesn't drag in the
      # full wasm + vite frontend build.
      - name: Stub frontend dist for tauri context macro
        shell: bash
        run: |
          mkdir -p dist
          printf '<!doctype html><title>ci</title>' > dist/index.html

      - name: Build tauri crate with forge-room feature
        run: cargo build --release -p manabrew --features forge-room

  # Squash-merge titles become the conventional commits that drive per-crate
  # version bumps on main (see release.yml) — an unparseable title would ship
  # as a silent patch, so lint it here.
  pr-title:
    name: PR title (conventional)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install commitlint
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Lint PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$TITLE" | yarn commitlint

  # Informational: what `cargo xtask release` would do after this PR merges
  # (approximate — squash merging rewrites the PR's commits into its title).
  # Also fails if ops/manifest.json was hand-edited out of sync.
  release-plan:
    name: Release plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Check ops/manifest.json is in sync
        run: cargo xtask manifest --check

      - name: Compute release plan
        run: cargo xtask plan --github-summary
