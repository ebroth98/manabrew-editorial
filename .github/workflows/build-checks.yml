name: Build checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript type-check ──────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - run: yarn

      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

  # ── WASM + card bundler ────────────────────────────────────────────
  wasm:
    name: WASM build
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - run: yarn

      - name: Build WASM + bundle cards
        run: npm run build:wasm

  # ── Rust workspace (engine, CLI, agent-interface) ──────────────────
  rust-engine:
    name: Rust engine
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Check engine crates
        run: >
          cargo check
          -p forge-foundation
          -p forge-carddb
          -p forge-engine-core
          -p forge-agent-interface

      - name: Run engine tests
        run: cargo test -p forge-engine-core --lib

  # ── Rust server ────────────────────────────────────────────────────
  rust-server:
    name: Rust server
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Check forge-server
        run: cargo check -p forge-server

  # ── Rust parity dashboard ─────────────────────────────────────────
  rust-parity:
    name: Rust parity dashboard
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Check forge-parity (with serve feature)
        run: cargo check -p forge-parity --features serve

  # ── Full web build (wasm + tsc + vite) ─────────────────────────────
  web-build:
    name: Web build (full)
    runs-on: [self-hosted, Linux]
    needs: [typescript, wasm]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - run: yarn

      - name: Build web (wasm + tsc + vite)
        run: npm run build:web

  # ── JSON lint (preset decks) ───────────────────────────────────────
  json-lint:
    name: JSON lint
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: Validate preset deck JSON files
        run: |
          EXIT=0
          for f in preset_decks/*.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in $f"
              EXIT=1
            fi
          done
          exit $EXIT
