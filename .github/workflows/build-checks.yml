name: Build checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cargo caches use rust-cache shared-keys (engine / relay / web-wasm /
# tauri-ios / tauri-android). PR-saved caches are only visible to the same
# branch, so cache-warm.yml re-saves them from main on every merge — keep the
# shared-keys and build commands here in sync with that workflow.

jobs:
  changes:
    name: Changed files
    runs-on: ubuntu-latest
    outputs:
      run_checks: ${{ steps.scope.outputs.run_checks }}
      run_rust: ${{ steps.scope.outputs.run_rust }}
      run_native: ${{ steps.scope.outputs.run_native }}
      run_forge_room: ${{ steps.scope.outputs.run_forge_room }}
    steps:
      - name: Classify changed files
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            // Entries ending in "/" match as path prefixes, the rest match
            // exactly. A submodule bump shows up as the bare gitlink path
            // ("forge"), not as files under it.
            const matches = (files, paths) =>
              files.some((file) =>
                paths.some((p) =>
                  p.endsWith('/') ? file.filename.startsWith(p) : file.filename === p,
                ),
              );

            // The GraalVM + forge-room build is slow (native-image), so only run
            // it when a file in the harness → native-lib → tauri link chain moves.
            const FORGE_ROOM_PATHS = [
              'forge',
              'forge/',
              'forge-harness/',
              'src-tauri/',
              'manabrew-rs/crates/self-hosted-node/',
              'scripts/harness.mjs',
              '.github/workflows/build-checks.yml',
            ];

            // Anything that can change a cargo build's inputs: workspace
            // members and manifests, the forge gitlink (card data feeds the
            // cardset archive), and preset decks (networking regression games).
            const RUST_PATHS = [
              'manabrew-rs/',
              'Cargo.toml',
              'Cargo.lock',
              'forge',
              'src-tauri/',
              'tree-sitter-forge-card-script/',
              'xtask/',
              'public/preset_decks/',
              '.github/workflows/build-checks.yml',
            ];

            // The mobile shells: the tauri crate plus everything the native
            // binaries link (the Rust workspace + card data) and the JS
            // toolchain that drives `tauri build` itself. Pure UI changes are
            // covered by web-build — the shells rebuild the same vite bundle
            // and add no signal for an hour of macOS/Android runner time.
            const NATIVE_PATHS = [
              'src-tauri/',
              'manabrew-rs/',
              'Cargo.toml',
              'Cargo.lock',
              'forge',
              'tree-sitter-forge-card-script/',
              'xtask/',
              'package.json',
              'yarn.lock',
              'scripts/mobile-dev.mjs',
              'scripts/build-wasm.mjs',
              '.github/workflows/build-checks.yml',
            ];

            if (context.eventName !== 'pull_request') {
              for (const key of ['run_checks', 'run_rust', 'run_native', 'run_forge_room']) {
                core.setOutput(key, 'true');
              }
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const websiteOnly = files.length > 0 && files.every((file) => file.filename.startsWith('website/'));
            core.setOutput('run_checks', websiteOnly ? 'false' : 'true');
            core.setOutput('run_rust', matches(files, RUST_PATHS) ? 'true' : 'false');
            core.setOutput('run_native', matches(files, NATIVE_PATHS) ? 'true' : 'false');
            core.setOutput('run_forge_room', matches(files, FORGE_ROOM_PATHS) ? 'true' : 'false');

  # ── TypeScript type-check ──────────────────────────────────────────
  # Builds the wasm bundle (or restores it from cache) and uploads it as an
  # artifact so web-build doesn't build it a second time.
  typescript:
    name: TypeScript & Wasm
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: web-wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      # Mirrors what scripts/ensure-wasm.mjs hashes (its own stamp can't be
      # used here: it hashes card-data mtimes, which a fresh checkout always
      # changes). The forge gitlink stands in for the card-data dirs.
      - name: Compute wasm output key
        id: wasm-key
        run: echo "key=wasm-output-$(git rev-parse HEAD:forge)-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'manabrew-rs/**/*.rs', 'manabrew-rs/**/Cargo.toml', 'scripts/build-wasm.mjs') }}" >> "$GITHUB_OUTPUT"

      - name: Wasm output cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            src/wasm
            public/wasm
          key: ${{ steps.wasm-key.outputs.key }}

      - name: Build wasm + cardset archive
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn build:wasm

      - name: Type-check
        run: yarn typecheck

      - name: Share wasm with web-build
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            src/wasm
            public/wasm
          if-no-files-found: error
          retention-days: 1

  # ── Rust workspace (engine, CLI, agent-interface) ──────────────────
  rust-engine:
    name: Rust engine
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: engine

      - name: Build engine crates (release)
        run: >
          cargo build --release
          -p forge-foundation
          -p forge-carddb
          -p manabrew-engine
          -p manabrew-agent-interface

      - name: Run engine tests (release)
        run: cargo test --release -pmanabrew-engine  --lib

  # ── Rust server ────────────────────────────────────────────────────
  rust-server:
    name: Rust server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: relay

      - name: Build manabrew-server (release)
        run: cargo build --release -p manabrew-server

  multiplayer-regression:
    name: Multiplayer zombie regression
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: relay

      - name: Build cardset archive
        run: cargo run -p forge-cardset-archive --features build --release --bin build-cardset-archive

      - name: Build relay and node
        run: cargo build --release -p manabrew-server -p self-hosted-node

      - name: Run networking regression suite
        run: >
          cargo test --release -p networking-tests
          --test networking_regression -- --ignored --nocapture --test-threads=1

  # ── Rust parity dashboard ─────────────────────────────────────────
  rust-parity:
    name: Rust parity dashboard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: engine

      - name: Build parity (with serve feature, release)
        run: cargo build --release -p parity --features serve

  # ── Full web build (wasm + tsc + vite) ─────────────────────────────
  # The wasm bundle comes prebuilt from the typescript job's artifact, so
  # this job only runs gen:types + tsc + vite on top of it.
  web-build:
    name: Web build (full)
    runs-on: ubuntu-latest
    needs: [changes, typescript]
    if: needs.changes.outputs.run_checks == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: web-wasm

      - run: yarn

      - name: Fetch wasm built by the typescript job
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist

      - name: Build web (tsc + vite, wasm prebuilt)
        run: yarn vite:build

  # ── JSON lint (preset decks) ───────────────────────────────────────
  json-lint:
    name: JSON lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_checks == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate preset deck JSON files
        run: |
          EXIT=0
          for f in public/preset_decks/*.json; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf-8'))" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in $f"
              EXIT=1
            fi
          done
          exit $EXIT

  # ── Mobile builds (unsigned) ───────────────────────────────────────
  # Compile-and-bundle checks mirroring publish.yml's ios-ipa / android-apk
  # jobs (same cardset-archive step, same runner pins) so a PR can't break
  # the release pipeline's mobile builds. Keep the step lists in sync with
  # publish.yml. Gated on run_native: pure UI changes exercise the same vite
  # bundle via web-build, so the shells only rebuild when native inputs move.
  ios-build:
    name: iOS build
    runs-on: macos-15
    needs: changes
    if: needs.changes.outputs.run_native == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-ios

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build cardset archive
        run: |
          cargo run -p forge-cardset-archive --features build --release \
            --bin build-cardset-archive

      - name: Tauri build (iOS, unsigned)
        run: yarn tauri ios build --no-sign

  android-build:
    name: Android build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_native == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-android

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build cardset archive
        run: |
          cargo run -p forge-cardset-archive --features build --release \
            --bin build-cardset-archive

      - name: Tauri build (Android APK, arm64)
        run: node scripts/mobile-dev.mjs android build --apk --target aarch64

  forge-room-graalvm-windows:
    name: GraalVM build (Windows)
    runs-on: windows-latest
    if: contains(github.event.pull_request.labels.*.name, 'ci:test-desktop')
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - run: yarn

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.ps1
        shell: pwsh

      - name: Stub frontend dist for tauri context macro
        shell: bash
        run: |
          mkdir -p dist
          printf '<!doctype html><title>ci</title>' > dist/index.html

      - name: Build tauri crate with forge-room feature
        run: cargo build --release -p manabrew --features forge-room

  forge-room-graalvm-macos:
    name: GraalVM build (macOS)
    runs-on: macos-latest
    if: contains(github.event.pull_request.labels.*.name, 'ci:test-desktop')
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - run: yarn

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.sh

      # `cargo build` of the tauri crate runs `generate_context!`, which embeds
      # `frontendDist` (../dist). Stub it so the link test doesn't drag in the
      # full wasm + vite frontend build.
      - name: Stub frontend dist for tauri context macro
        shell: bash
        run: |
          mkdir -p dist
          printf '<!doctype html><title>ci</title>' > dist/index.html

      - name: Build tauri crate with forge-room feature
        run: cargo build --release -p manabrew --features forge-room

  # Squash-merge titles become the conventional commits that drive per-crate
  # version bumps on main (see release.yml) — an unparseable title would ship
  # as a silent patch, so lint it here.
  pr-title:
    name: PR title (conventional)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install commitlint
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Lint PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$TITLE" | yarn commitlint

  # Informational: what `cargo xtask release` would do after this PR merges
  # (approximate — squash merging rewrites the PR's commits into its title).
  # Also fails if ops/manifest.json was hand-edited out of sync.
  release-plan:
    name: Release plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Check ops/manifest.json is in sync
        run: cargo xtask manifest --check

      - name: Compute release plan
        run: cargo xtask plan --github-summary
