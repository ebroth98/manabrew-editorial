name: Hosted Smoke

on:
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosted-smoke:
    # Heavy (builds the JVM node image), so only on the `hosted-smoke` label,
    # the nightly schedule, or a manual dispatch.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'hosted-smoke'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 60
    env:
      FORGE_SERVER_KEY: forge
      SELF_HOSTED_NODE_MAX_GAMES: "1"
      HOSTED_SMOKE_RELAY_URL: ws://127.0.0.1:9443
      HOSTED_SMOKE_SERVER_KEY: forge
      HOSTED_SMOKE_GAMES: "1"
      HOSTED_SMOKE_TIMEOUT_SECS: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive

      - name: Bring up relay + node
        run: docker compose -f compose.local.yml up --build -d

      - name: Wait for node to host a room
        run: |
          for _ in $(seq 1 60); do
            if docker compose -f compose.local.yml logs self-hosted-node 2>&1 | grep -q "creating room"; then
              echo "node is hosting a room"
              exit 0
            fi
            sleep 5
          done
          echo "node never reported a hosted room" >&2
          docker compose -f compose.local.yml logs --tail 200 >&2
          exit 1

      - name: Run hosted smoke
        run: cargo test -p self-hosted-node --test hosted_smoke -- --ignored --nocapture

      - name: Stack logs
        if: always()
        run: docker compose -f compose.local.yml logs --tail 300

      - name: Tear down
        if: always()
        run: docker compose -f compose.local.yml down -v
