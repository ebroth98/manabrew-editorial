name: Parity regression

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    paths:
      - "forge/**"
      - "forge-engine/**"
      - "!forge-engine/**/*.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/parity-self-hosted.yml"
      - "scripts/parity-rust-vs-rust.mjs"
      - "scripts/parity-classify-entries.mjs"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forge-engine-unit:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Run forge-engine unit tests
        run: yarn test:forge-engine

  classify:
    # Splits regression.json into `new` (added or changed vs main) and `existing`
    # entries. Also records whether the PR asked for a full Java reverify.
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    outputs:
      new_count: ${{ steps.split.outputs.new_count }}
      existing_count: ${{ steps.split.outputs.existing_count }}
      force_full_java: ${{ steps.label.outputs.force_full_java }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Fetch main regression.json
        run: |
          git fetch --depth=1 origin main
          mkdir -p main-ref
          git show origin/main:forge-engine/crates/forge-parity/regression.json > main-ref/regression.json

      - name: Classify entries
        id: split
        run: |
          node scripts/parity-classify-entries.mjs \
            --branch forge-engine/crates/forge-parity/regression.json \
            --main main-ref/regression.json \
            --out-new new-entries.json \
            --out-existing existing-entries.json
          echo "new_count=$(jq 'length' new-entries.json)" >> "$GITHUB_OUTPUT"
          echo "existing_count=$(jq 'length' existing-entries.json)" >> "$GITHUB_OUTPUT"

      - name: Detect force-full-java label
        id: label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | jq -e 'any(. == "parity-reverify-java")' >/dev/null; then
            echo "force_full_java=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_full_java=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload partitioned entries
        uses: actions/upload-artifact@v4
        with:
          name: regression-partitions
          path: |
            new-entries.json
            existing-entries.json
          retention-days: 7

  # TEMPORARILY DISABLED: the rust-vs-rust fast path is commented out so
  # every PR runs the full Java parity sweep below. Re-enable by
  # uncommenting this job AND restoring `parity-regression.if` to the
  # original condition (`new_count != '0' || force_full_java == 'true'`).
  #
  # rust-vs-rust:
  #   # Fast path: for entries that are byte-identical to main, run rust-branch and
  #   # rust-main over the same seeds and diff the emitted GameTrace JSONs. No JVM.
  #   needs: classify
  #   if: needs.classify.outputs.existing_count != '0' && needs.classify.outputs.force_full_java != 'true'
  #   runs-on: [self-hosted, Linux]
  #   timeout-minutes: 45
  #   steps:
  #     - name: Checkout branch
  #       uses: actions/checkout@v4
  #       with:
  #         clean: true
  #         path: branch
  #         fetch-depth: 0
  #
  #     - name: Checkout main
  #       uses: actions/checkout@v4
  #       with:
  #         ref: main
  #         clean: true
  #         path: main-ref
  #
  #     - name: Build forge-parity (branch)
  #       working-directory: branch
  #       run: cargo build -p forge-parity --release
  #
  #     - name: Build cardset archive (branch)
  #       working-directory: branch
  #       run: |
  #         cargo run -p forge-cardset-archive --features build --release \
  #           --bin build-cardset-archive
  #
  #     - name: Build forge-parity (main)
  #       working-directory: main-ref
  #       run: cargo build -p forge-parity --release
  #
  #     - name: Build cardset archive (main)
  #       working-directory: main-ref
  #       run: |
  #         cargo run -p forge-cardset-archive --features build --release \
  #           --bin build-cardset-archive
  #
  #     - name: Download partitioned entries
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: regression-partitions
  #         path: partitions
  #
  #     - name: Diff traces
  #       working-directory: branch
  #       run: |
  #         node scripts/parity-rust-vs-rust.mjs \
  #           --branch-bin ../branch/target/release/forge-parity \
  #           --main-bin   ../main-ref/target/release/forge-parity \
  #           --entries    ../partitions/existing-entries.json \
  #           --cards-dir  ../branch/forge/forge-gui/res/cardsfolder \
  #           --decks-dir  ../branch/public/preset_decks \
  #           --out-dir    ../rust-vs-rust-out
  #
  #     - name: Upload rust-vs-rust artifacts
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: rust-vs-rust-out
  #         path: rust-vs-rust-out
  #         if-no-files-found: ignore
  #         retention-days: 7

  parity-regression:
    # TEMPORARILY: always runs the full Java parity sweep (the rust-vs-rust
    # fast path is disabled above). Restore the original conditional when
    # re-enabling rust-vs-rust:
    #   if: needs.classify.outputs.new_count != '0' || needs.classify.outputs.force_full_java == 'true'
    needs: classify
    if: always()
    runs-on: [self-hosted, Linux, run_parity]
    timeout-minutes: 90
    env:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Download partitioned entries
        uses: actions/download-artifact@v4
        with:
          name: regression-partitions
          path: partitions

      - name: Pick entries for Java run
        id: pick
        # TEMPORARILY: always run the full regression set (rust-vs-rust is
        # disabled above). Restore the if/else branching on
        # `force_full_java` when re-enabling the fast path.
        run: |
          cp forge-engine/crates/forge-parity/regression.json java-entries.json
          echo "source=full" >> "$GITHUB_OUTPUT"
          echo "Java harness will process $(jq 'length' java-entries.json) entries"

      - name: Restore Java cache
        uses: actions/cache@v4
        with:
          path: .parity-cache
          key: parity-java-${{ hashFiles('forge/forge-harness/src/**', 'forge/forge-game/src/**', 'forge/forge-core/src/**', 'forge/forge-ai/src/**', 'public/preset_decks/**') }}

      - name: Select Java 17
        run: |
          echo "$JAVA_HOME/bin" >> "$GITHUB_PATH"
          "$JAVA_HOME/bin/java" --version
          mvn -version

      - name: Build Java parity harness JAR
        working-directory: forge
        run: mvn -pl forge-harness -am -DskipTests package

      - name: Build forge-parity
        run: cargo build -p forge-parity --features serve --release

      - name: Build cardset archive
        run: |
          cargo run -p forge-cardset-archive --features build --release \
            --bin build-cardset-archive

      - name: Start parity server
        run: |
          (
            ./target/release/forge-parity \
              --ci --serve --port 8080 --verbose \
              --java-jar forge/forge-harness/target/forge-harness-jar-with-dependencies.jar \
              --db-path parity-ci.db \
              > parity-server.log 2>&1
            echo $? > parity-server.exitcode
          ) &
          echo $! > server.pid
          echo "Server PID: $(cat server.pid)"

      - name: Wait for server health
        run: ./target/release/forge-parity ci-client health --server http://localhost:8080

      - name: Submit regression jobs
        id: submit
        run: |
          BATCH_ID=$(./target/release/forge-parity ci-client submit \
            --server http://localhost:8080 \
            --file java-entries.json)
          echo "batch_id=$BATCH_ID" >> "$GITHUB_OUTPUT"

      - name: Poll for results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./target/release/forge-parity ci-client poll \
            --server http://localhost:8080 \
            --batch-id ${{ steps.submit.outputs.batch_id }} \
            --repo ${{ github.repository }} \
            --pr ${{ github.event.pull_request.number || '0' }}

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            if kill -0 $PID 2>/dev/null; then
              echo "Stopping server (PID $PID)"
              kill $PID 2>/dev/null || true
              sleep 2
              kill -9 $PID 2>/dev/null || true
            else
              echo "Server process was already stopped before teardown (PID $PID)"
            fi
            wait $PID 2>/dev/null || true
            rm -f server.pid
          fi
          if [ -f parity-server.exitcode ]; then
            echo "Server wrapper exit code: $(cat parity-server.exitcode)"
          else
            echo "Server wrapper exit code file missing"
          fi
          echo "=== Server log (last 50 lines) ==="
          tail -50 parity-server.log 2>/dev/null || true

      - name: Upload parity database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-ci-db
          path: parity-ci.db
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-server-log
          path: parity-server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload server exit code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-server-exitcode
          path: parity-server.exitcode
          if-no-files-found: ignore
          retention-days: 7
