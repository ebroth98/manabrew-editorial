name: Cache warm

# build-checks.yml only runs on pull_request, and Actions caches saved from a
# PR run are scoped to that PR's branch — invisible to every other PR. Nothing
# else compiles on main, so without this workflow the first push of every PR
# starts from a cold cache. Each job here mirrors the build commands and
# rust-cache shared-key of a build-checks job and saves main-scoped caches,
# which every PR run (and every tag build) can restore.
#
# Steady-state cost is low: every job is gated on whether its inputs actually
# changed in the pushed commit (a UI-only merge warms nothing), rust-cache
# skips saving when its key (toolchain + lockfile) already has an entry, and
# release bump commits — which only move version numbers — are skipped
# entirely. The weekly schedule re-runs everything unconditionally so the
# caches never hit GitHub's 7-day unused-entry eviction.

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC — keepalive against cache eviction
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cache-warm
  cancel-in-progress: true

jobs:
  # What changed in this push decides which warms are worth running. The
  # docker warms only feed reusable *dependency* layers (chef cooks, yarn
  # install) — PR previews and release commits have different sources, so
  # main's final compile layers never transfer — hence the docker gate only
  # watches manifests/lockfiles/Dockerfiles, not source trees. Non-push runs
  # (schedule, dispatch) warm everything.
  changes:
    name: Changed inputs
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.scope.outputs.rust }}
      docker: ${{ steps.scope.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Classify pushed changes
        id: scope
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" != "push" ] || ! git rev-parse --verify -q HEAD^ >/dev/null; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            echo "docker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rust=false
          docker=false
          while IFS= read -r f; do
            case "$f" in
              manabrew-rs/*|Cargo.toml|Cargo.lock|forge|src-tauri/*|tree-sitter-forge-card-script/*|xtask/*|public/preset_decks/*|.github/workflows/cache-warm.yml)
                rust=true ;;
            esac
            case "$f" in
              Cargo.toml|Cargo.lock|package.json|yarn.lock|*Dockerfile*|.dockerignore|.github/workflows/cache-warm.yml)
                docker=true ;;
            esac
          done < <(git diff --name-only HEAD^ HEAD)
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "docker=$docker" >> "$GITHUB_OUTPUT"

  # GHA caches are ref-scoped: docker layers cached by a PR's preview build
  # are invisible to other PRs, and a release tag's layers are invisible to
  # the next tag. Only main-scoped caches are readable everywhere — so warm
  # the image layer caches (the cargo-chef dependency cooks especially) here.
  # `push: false`: this only populates the cache. The cook layers sit before
  # the VITE_* ARGs in Dockerfile.web, so one warm serves the prod, staging
  # and preview arg variants alike. Ironsmith stays dark (mirrors the
  # docker-images.yml default; its stage caches on its own sources anyway).
  docker-layers:
    name: Warm ${{ matrix.image }} layers
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.docker == 'true' && !startsWith(github.event.head_commit.message, 'chore(release):')
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: manabrew-server
            dockerfile: manabrew-rs/crates/manabrew-server/Dockerfile
          - image: manabrew-web
            dockerfile: Dockerfile.web
          - image: manabrew-node
            dockerfile: manabrew-rs/crates/self-hosted-node/Dockerfile
          - image: manabrew-hub
            dockerfile: manabrew-rs/crates/manabrew-hub/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (cache only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  engine:
    name: Warm engine & parity
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.rust == 'true' && !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: engine

      - name: Build engine crates + parity (release)
        run: >
          cargo build --release
          -p forge-foundation
          -p forge-carddb
          -p manabrew-engine
          -p manabrew-agent-interface
          -p parity --features parity/serve

      - name: Build engine test artifacts
        run: cargo test --release -pmanabrew-engine  --lib --no-run

  relay:
    name: Warm relay & node
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.rust == 'true' && !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: relay

      - name: Build cardset archive
        run: cargo run -p forge-cardset-archive --features build --release --bin build-cardset-archive

      - name: Build relay and node
        run: cargo build --release -p manabrew-server -p self-hosted-node

      - name: Build networking test artifacts
        run: cargo test --release -p networking-tests --test networking_regression --no-run

  web-wasm:
    name: Warm wasm & xtask
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.rust == 'true' && !startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install Yarn
        run: npm install --global yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: web-wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      # Same key recipe as build-checks' typescript job — keep them in sync so
      # PR runs hit the cache warmed here.
      - name: Compute wasm output key
        id: wasm-key
        run: echo "key=wasm-output-$(git rev-parse HEAD:forge)-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'manabrew-rs/**/*.rs', 'manabrew-rs/**/Cargo.toml', 'scripts/build-wasm.mjs') }}" >> "$GITHUB_OUTPUT"

      - name: Wasm output cache
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: |
            src/wasm
            public/wasm
          key: ${{ steps.wasm-key.outputs.key }}

      - name: Build wasm + cardset archive
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: yarn build:wasm

      - name: Warm xtask (gen:types)
        run: yarn gen:types
