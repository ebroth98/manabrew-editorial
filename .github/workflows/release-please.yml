name: Release Please

# Watches `main` for Conventional Commits, opens/updates a "Release PR" that
# bumps the version in package.json, src-tauri/tauri.conf.json and
# src-tauri/Cargo.toml plus regenerates CHANGELOG.md. Merging that PR creates
# a `vX.Y.Z` tag + GitHub Release; the existing `release-artifacts.yml`
# workflow then builds the macOS .dmg / Windows .exe and attaches them to
# that same release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Run release-please
    runs-on: [self-hosted, Linux]
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
