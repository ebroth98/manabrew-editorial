name: Publish

# The release pipeline, driven by the v* tag `cargo xtask release` pushes
# from release.yml on every merge to main:
#   1. build the Tauri desktop installers (macOS .dmg, Windows .exe / .msi)
#      on GitHub-hosted runners, signed for the auto-updater,
#   2. attach them + the updater manifest (tauri.json) to the GitHub Release
#      xtask already created,
#   3. deploy the Wasm/web stack to production (deploy.sh over SSH) — LAST,
#      so play.manabrew.app/tauri.json (a redirect to the release asset) and
#      the served manifest.json never get ahead of assets that exist.
# There is no main-push deploy: main commits only run release.yml.
#
# GitHub-hosted runners are free for public repositories (unlimited minutes
# on standard ubuntu-latest / windows-latest / macos-latest). The previous
# revision used self-hosted runners; migrating off them lets us drop the
# manual provisioning step (scripts/setup-{linux,windows}-runner.{sh,ps1}
# are still kept around for the parity dashboard host).

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── macOS .dmg ─────────────────────────────────────────────────────
  # macos-latest = Apple Silicon (arm64). Produces an arm64 .dmg. If you
  # ever need Intel too, add an `arch: [arm64, x86_64]` matrix and pass
  # `--target` to `tauri build`.
  macos-dmg:
    name: Build macOS .dmg
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-macos

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.sh

      - name: Tauri build (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: yarn tauri -- build --features forge-room --config src-tauri/updater.conf.json

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 4096-char embed-description limit.
      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          ZERO_SHA='0000000000000000000000000000000000000000'
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO_SHA" ] && git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            RANGE="${BEFORE}..${AFTER}"
          else
            RANGE="${AFTER}~5..${AFTER}"
          fi
          LOG=$(git log --pretty=format:'- %s (%h, %an)' "$RANGE" 2>/dev/null || echo '')
          if [ -z "$LOG" ]; then
            LOG=$(git log --pretty=format:'- %s (%h, %an)' -n 5 "$AFTER" 2>/dev/null || echo '')
          fi
          MAX=1500
          if [ "${#LOG}" -gt "$MAX" ]; then
            LOG="${LOG:0:$MAX}"$'\n'"… (truncated)"
          fi
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Discord embed (macOS artifact)
        if: ${{ success() }}
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          ARTIFACT_NAME: macos-dmg-${{ github.sha }}
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"
          TITLE="🍎 macOS build ready"
          COLOR=5793266   # 0x5865F2 blurple

          DESC=$(printf '%s\n\n%s\n\n%s\n%s' \
            "🧪 Fresh \`.dmg\` artifact attached to the workflow run." \
            "📦 [Download \`${ARTIFACT_NAME}\` from the workflow run](${RUN_URL}) (sign-in required, 30-day retention)." \
            "📝 **Changelog**" \
            "${CHANGELOG}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see workflow run for full log)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RUN_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          # Write PAYLOAD to a file and use --data-binary @file so curl reads
          # the body bytes verbatim. Passing via -d "$PAYLOAD" goes through
          # Windows argv encoding (Bash → CreateProcess UTF-16 → curl), which
          # mangles raw-UTF-8 emoji in the JSON and trips Discord error 50109
          # (invalid JSON). Mac argv preserves UTF-8 so it didn't surface there.
          REQ=$(mktemp)
          printf '%s' "$PAYLOAD" > "$REQ"

          post_discord() {
            local attempt=0
            local max_attempts=3
            local delay=2
            local body http
            body=$(mktemp)
            while :; do
              attempt=$((attempt + 1))
              http=$(curl -sS -X POST \
                -H "Authorization: Bot $BOT_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary "@$REQ" \
                -o "$body" \
                -w "%{http_code}" \
                "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" || echo "000")

              if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
                echo "Discord notification posted (HTTP $http)."
                rm -f "$body" "$REQ"
                return 0
              fi

              echo "::warning::Discord API returned HTTP $http on attempt $attempt: $(cat "$body" 2>/dev/null)"
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Giving up on Discord notification after $attempt attempts; artifact build itself succeeded."
                rm -f "$body" "$REQ"
                return 0
              fi
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          post_discord

  # ── Windows .exe ───────────────────────────────────────────────────
  # windows-latest is x86_64. NSIS + WiX (.msi) ship preinstalled on the
  # runner image. MSVC env is loaded per-step via ilammy/msvc-dev-cmd.
  windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-windows

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.ps1
        shell: pwsh

      - name: Tauri build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: yarn tauri -- build --features forge-room --config src-tauri/updater.conf.json

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          # NSIS produces the self-installing .exe, WiX produces the .msi.
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      # Build a per-artifact changelog so the Discord notification carries
      # the list of commits since the previous push. Trimmed so the whole
      # message stays well under Discord's 4096-char embed-description limit.
      # Uses bash (Git for Windows ships it) to mirror the macOS step byte
      # for byte and avoid pwsh's CRLF/Out-File quirks leaking into the env.
      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          ZERO_SHA='0000000000000000000000000000000000000000'
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO_SHA" ] && git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            RANGE="${BEFORE}..${AFTER}"
          else
            RANGE="${AFTER}~5..${AFTER}"
          fi
          LOG=$(git log --pretty=format:'- %s (%h, %an)' "$RANGE" 2>/dev/null || echo '')
          if [ -z "$LOG" ]; then
            LOG=$(git log --pretty=format:'- %s (%h, %an)' -n 5 "$AFTER" 2>/dev/null || echo '')
          fi
          MAX=1500
          if [ "${#LOG}" -gt "$MAX" ]; then
            LOG="${LOG:0:$MAX}"$'\n'"… (truncated)"
          fi
          {
            echo 'changelog<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Discord embed (Windows artifact)
        if: ${{ success() }}
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          ARTIFACT_NAME: windows-exe-${{ github.sha }}
        # Git for Windows ships bash + jq + curl on the runner image, so the
        # same bash block we use on macOS works here too.
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"
          TITLE="🪟 Windows build ready"
          COLOR=5793266   # 0x5865F2 blurple

          DESC=$(printf '%s\n\n%s\n\n%s\n%s' \
            "🧪 Fresh \`.exe\` + \`.msi\` artifact attached to the workflow run." \
            "📦 [Download \`${ARTIFACT_NAME}\` from the workflow run](${RUN_URL}) (sign-in required, 30-day retention)." \
            "📝 **Changelog**" \
            "${CHANGELOG}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see workflow run for full log)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RUN_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          # Write PAYLOAD to a file and use --data-binary @file so curl reads
          # the body bytes verbatim. Passing via -d "$PAYLOAD" goes through
          # Windows argv encoding (Bash → CreateProcess UTF-16 → curl), which
          # mangles raw-UTF-8 emoji in the JSON and trips Discord error 50109
          # (invalid JSON). Mac argv preserves UTF-8 so it didn't surface there.
          REQ=$(mktemp)
          printf '%s' "$PAYLOAD" > "$REQ"

          post_discord() {
            local attempt=0
            local max_attempts=3
            local delay=2
            local body http
            body=$(mktemp)
            while :; do
              attempt=$((attempt + 1))
              http=$(curl -sS -X POST \
                -H "Authorization: Bot $BOT_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary "@$REQ" \
                -o "$body" \
                -w "%{http_code}" \
                "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" || echo "000")

              if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
                echo "Discord notification posted (HTTP $http)."
                rm -f "$body" "$REQ"
                return 0
              fi

              echo "::warning::Discord API returned HTTP $http on attempt $attempt: $(cat "$body" 2>/dev/null)"
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Giving up on Discord notification after $attempt attempts; artifact build itself succeeded."
                rm -f "$body" "$REQ"
                return 0
              fi
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          post_discord

  # ── iOS .ipa (SideStore) ───────────────────────────────────────────
  # Unsigned IPA for sideloading via SideStore, which re-signs on-device
  # with the user's own Apple ID. Mobile builds neither host Forge rooms
  # nor need the GraalVM harness, so this job skips GraalVM/Maven entirely
  # (tauri.ios.conf.json overrides beforeBuildCommand to `yarn vite:build`).
  ios-ipa:
    name: Build iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-ios

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Tauri build (iOS, unsigned)
        run: yarn tauri ios build --no-sign

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: error
          retention-days: 30

  # ── Android .apk ───────────────────────────────────────────────────
  # arm64 APK attached to the GitHub Release. Like iOS, Android hosts no
  # Forge rooms and skips the GraalVM harness (tauri.android.conf.json
  # overrides beforeBuildCommand); the card DB is embedded in the binary
  # (card_db.rs) since APK assets can't be mmap'd. The SDK + an NDK ship
  # preinstalled on ubuntu-latest; scripts/mobile-dev.mjs derives
  # ANDROID_HOME / NDK_HOME. The release APK is unsigned — a keystore
  # secret would be needed to produce an installable signed build.
  android-apk:
    name: Build Android .apk
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-android

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Tauri build (Android APK, arm64)
        run: node scripts/mobile-dev.mjs android build --apk --target aarch64

      - name: Upload .apk
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

  # ── Publish GitHub Release ─────────────────────────────────────────
  # Downloads the artifacts built above, generates the updater manifest,
  # and attaches everything to the GitHub Release xtask created for the tag.
  release:
    name: Publish GitHub Release
    needs: [macos-dmg, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          path: release-assets/windows

      - name: Generate updater manifest (tauri.json)
        run: node scripts/gen-updater-manifest.mjs --tag "${{ github.ref_name }}" --assets release-assets --out release-assets/tauri.json

      # Attach artifacts to the release release-please already created from
      # CHANGELOG.md. Omitting `body` makes softprops/action-gh-release leave
      # the existing release notes untouched.
      - name: Attach artifacts to release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.app.tar.gz
            release-assets/macos/**/*.app.tar.gz.sig
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.exe.sig
            release-assets/windows/**/*.msi
            release-assets/tauri.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release body for Discord
        id: relbody
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          BODY=$(gh release view "$TAG" --json body --jq .body 2>/dev/null || echo '')
          {
            echo 'body<<RELBODY_EOF'
            echo "$BODY"
            echo 'RELBODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Discord embed (release published)
        if: steps.publish.outputs.url != ''
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: ${{ steps.publish.outputs.url }}
          RELEASE_BODY: ${{ steps.relbody.outputs.body }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"

          if [ "$PRERELEASE" = "true" ]; then
            TITLE="🧪 manabrew ${RELEASE_TAG} (pre-release)"
            COLOR=16753920   # 0xFFA500 orange
          else
            TITLE="🎁 manabrew ${RELEASE_TAG} released"
            COLOR=5763719    # 0x57F287 green
          fi

          DESC=$(printf '%s\n\n%s\n%s' \
            "📥 Public download (no GitHub account needed): ${RELEASE_URL}" \
            "📝 **Changelog**" \
            "${RELEASE_BODY}")

          MAX=3900
          if [ "${#DESC}" -gt "$MAX" ]; then
            DESC="${DESC:0:$MAX}"$'\n'"… (truncated — see release page for full notes)"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RELEASE_URL" \
            --arg desc "$DESC" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          # Write PAYLOAD to a file and use --data-binary @file so curl reads
          # the body bytes verbatim. Passing via -d "$PAYLOAD" goes through
          # Windows argv encoding (Bash → CreateProcess UTF-16 → curl), which
          # mangles raw-UTF-8 emoji in the JSON and trips Discord error 50109
          # (invalid JSON). Mac argv preserves UTF-8 so it didn't surface there.
          REQ=$(mktemp)
          printf '%s' "$PAYLOAD" > "$REQ"

          post_discord() {
            local attempt=0
            local max_attempts=3
            local delay=2
            local body http
            body=$(mktemp)
            while :; do
              attempt=$((attempt + 1))
              http=$(curl -sS -X POST \
                -H "Authorization: Bot $BOT_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary "@$REQ" \
                -o "$body" \
                -w "%{http_code}" \
                "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" || echo "000")

              if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
                echo "Discord notification posted (HTTP $http)."
                rm -f "$body" "$REQ"
                return 0
              fi

              echo "::warning::Discord API returned HTTP $http on attempt $attempt: $(cat "$body" 2>/dev/null)"
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Giving up on Discord notification after $attempt attempts; artifact build itself succeeded."
                rm -f "$body" "$REQ"
                return 0
              fi
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          post_discord

  # ── Attach mobile artifacts to the Release ─────────────────────────
  # Uploads the iOS .ipa and Android .apk to the published Release. Kept
  # OUT of the `release` job's `needs` so a flaky mobile build never blocks
  # the desktop installers: this job runs after `release` regardless of the
  # mobile jobs' results (`if: always()`), downloads whichever artifacts
  # exist, and uploads each — a missing one is skipped, not fatal.
  release-mobile:
    name: Attach mobile artifacts to release
    needs: [release, ios-ipa, android-apk]
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download iOS IPA
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: mobile/ios

      - name: Download Android APK
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: mobile/android

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          files=(mobile/ios/**/*.ipa mobile/android/**/*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No mobile artifacts found — both mobile builds failed?"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber --repo "$REPO"
          done

  # ── Deploy production (runs LAST) ──────────────────────────────────
  # Ships the Wasm/web stack only after the Release has all its artifacts,
  # so the tauri.json redirect and the served manifest.json never point at
  # assets that don't exist yet. Job-level concurrency serializes deploys
  # across runs (two tags in flight must not deploy concurrently).
  deploy:
    name: Deploy production
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: wasm-deploy
      cancel-in-progress: false
    steps:
      - name: SSH and run deploy.sh
        id: deploy
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # ServerAliveInterval/CountMax keep the SSH connection healthy
          # while deploy.sh has quiet stretches (cargo compiles, docker
          # pulls). Without them the runner's SSH client times out after
          # a few minutes idle and we get `client_loop: send disconnect:
          # Broken pipe` mid-deploy.
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              "$USER@$HOST" \
            "cd '$DEPLOY_PATH' && ./deploy.sh 2>&1" 2>&1 | tee deploy.log
          exit ${PIPESTATUS[0]}

      - name: Fetch raw deploy log on failure
        if: steps.deploy.outcome != 'success'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        continue-on-error: true
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$USER@$HOST:/tmp/deploy-raw.log" deploy-raw.log || \
            echo "(raw log not retrievable from server)"

      - name: Post Discord embed (as bot)
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHANNEL_ID:-}" ]; then
            echo "DISCORD_BOT_TOKEN or DISCORD_DEPLOY_CHANNEL_ID not set; skipping notification."
            exit 0
          fi

          if [ -f deploy.log ] && [ -s deploy.log ]; then
            LOG=$(cat deploy.log)
          else
            LOG="(no log captured — SSH step failed before any output; see workflow run)"
          fi

          # Discord embed description hard cap is 4096 chars.
          MAX=3900
          if [ "${#LOG}" -gt "$MAX" ]; then
            LOG="${LOG:0:$MAX}"$'\n'"… (truncated — see workflow run for full log)"
          fi

          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            COLOR=5763719   # 0x57F287 green
            TITLE="🚀 Wasm deploy successful"
          else
            COLOR=15548997  # 0xED4245 red
            TITLE="💥 Wasm deploy failed"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          AVATAR_URL="https://github.com/${ACTOR}.png?size=64"
          ACTOR_URL="https://github.com/${ACTOR}"

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$RUN_URL" \
            --arg desc "$LOG" \
            --arg footer "manabrew · $SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg avatar_url "$AVATAR_URL" \
            --arg timestamp "$TIMESTAMP" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: $color,
                author: { name: $actor, url: $actor_url, icon_url: $avatar_url },
                footer: { text: $footer },
                timestamp: $timestamp
              }]
            }')

          # A failed notification (stale bot token, Discord outage, network
          # blip) must never fail the deploy job: capture the HTTP status and
          # downgrade any non-2xx to a ::warning:: annotation.
          body=$(mktemp)
          if [ "$DEPLOY_OUTCOME" != "success" ] && [ -f deploy-raw.log ] && [ -s deploy-raw.log ]; then
            http=$(curl -sS -X POST \
              -H "Authorization: Bot $BOT_TOKEN" \
              -F "payload_json=$PAYLOAD" \
              -F "files[0]=@deploy-raw.log;type=text/plain" \
              -o "$body" -w "%{http_code}" \
              "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" || echo "000")
          else
            http=$(curl -sS -X POST \
              -H "Authorization: Bot $BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              -o "$body" -w "%{http_code}" \
              "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" || echo "000")
          fi

          if [ "$http" -ge 200 ] && [ "$http" -lt 300 ]; then
            echo "Discord notification posted (HTTP $http)."
          else
            echo "::warning::Discord notification failed (HTTP $http): $(cat "$body" 2>/dev/null); deploy result is unaffected."
          fi
          rm -f "$body"

      - name: Fail job if deploy failed
        if: steps.deploy.outcome != 'success'
        run: |
          echo "deploy step outcome: ${{ steps.deploy.outcome }}"
          exit 1

  # ── Publish SideStore source (runs after web deploy) ───────────────
  # Ships the unsigned iOS IPA + a regenerated apps.json to the deploy
  # host's ops/sidestore/ dir, bind-mounted into the caddy container at
  # /srv/manabrew/sidestore (compose.production.yml). Runs after `deploy`
  # so the /sidestore Caddy route and the bind-mount are live before the
  # files land. SideStore source URL: play.manabrew.app/sidestore/apps.json.
  deploy-sidestore:
    name: Publish SideStore source
    needs: [deploy, ios-ipa]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: sidestore-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: ipa

      - name: Stage SideStore artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sidestore-out
          cp "$(find ipa -name '*.ipa' | head -1)" "sidestore-out/Manabrew-${VERSION}.ipa"
          cp src-tauri/icons/512x512.png sidestore-out/icon.png
          node scripts/gen-sidestore-source.mjs \
            --tag "$GITHUB_REF_NAME" \
            --ipa "sidestore-out/Manabrew-${VERSION}.ipa" \
            --out sidestore-out/apps.json \
            --date "$(date -u +%Y-%m-%d)"

      - name: Rsync to deploy host
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --chmod=F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            sidestore-out/ "$USER@$HOST:$DEPLOY_PATH/ops/sidestore/"
