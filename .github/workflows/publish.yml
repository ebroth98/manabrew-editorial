name: Publish

# The release pipeline, driven by the v* tag `cargo xtask release` pushes
# from release.yml on every merge to main:
#   1. build the Tauri desktop installers (macOS .dmg, Windows .exe / .msi)
#      on GitHub-hosted runners, signed for the auto-updater,
#   2. attach them + the updater manifest (tauri.json) to the GitHub Release
#      xtask already created,
#   3. deploy the Wasm/web stack to production (deploy.sh over SSH). When the
#      release is relay-compatible (deploy-gate: no semver-incompatible bump
#      of manabrew-protocol / manabrew-server / manabrew-hub), deploy-web
#      ships it EARLY — in parallel with the installer builds — with the
#      served /manifest.json held back at the previous release so installed
#      apps aren't told to update before the installers exist (the final
#      deploy job releases it). Incompatible releases keep the old ordering:
#      deploy only after the Release has all its assets, so no installed
#      client is stranded against a relay it can't talk to.
# There is no main-push deploy: main commits only run release.yml.
#
# GitHub-hosted runners are free for public repositories (unlimited minutes
# on standard ubuntu-latest / windows-latest / macos-latest). The previous
# revision used self-hosted runners; migrating off them lets us drop the
# manual provisioning step (scripts/setup-{linux,windows}-runner.{sh,ps1}
# are still kept around for the parity dashboard host).

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── macOS .dmg ─────────────────────────────────────────────────────
  # macos-latest = Apple Silicon (arm64). Produces an arm64 .dmg. If you
  # ever need Intel too, add an `arch: [arm64, x86_64]` matrix and pass
  # `--target` to `tauri build`.
  macos-dmg:
    name: Build macOS .dmg
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-macos

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.sh

      - name: Tauri build (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: yarn tauri -- build --features forge-room --config src-tauri/updater.conf.json

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 30

      - name: Build changelog
        id: changelog
        uses: ./.github/actions/commit-changelog
        with:
          before: ${{ github.event.before }}
          after: ${{ github.sha }}

      - name: Post Discord embed (macOS artifact)
        if: ${{ success() }}
        uses: ./.github/actions/discord-notify
        with:
          bot-token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel-id: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          title: "🍎 macOS build ready"
          color: "5793266" # 0x5865F2 blurple
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          description: |
            🧪 Fresh `.dmg` artifact attached to the workflow run.

            📦 [Download `macos-dmg-${{ github.sha }}` from the workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (sign-in required, 30-day retention).

            📝 **Changelog**
            ${{ steps.changelog.outputs.changelog }}

  # ── Windows .exe ───────────────────────────────────────────────────
  # windows-latest is x86_64. NSIS + WiX (.msi) ship preinstalled on the
  # runner image. MSVC env is loaded per-step via ilammy/msvc-dev-cmd.
  windows-exe:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up GraalVM (JDK 21)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: "maven"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-windows

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      - name: Build Forge harness jar (Maven, GraalVM JDK 21)
        run: yarn build:harness

      - name: Build native Forge library (GraalVM native-image)
        run: ./forge-harness/build-native.ps1
        shell: pwsh

      - name: Tauri build (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: yarn tauri -- build --features forge-room --config src-tauri/updater.conf.json

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          # Cargo workspace lives at repo root; target/ is there, not in src-tauri/.
          # NSIS produces the self-installing .exe, WiX produces the .msi.
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.exe.sig
            target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Build changelog
        id: changelog
        uses: ./.github/actions/commit-changelog
        with:
          before: ${{ github.event.before }}
          after: ${{ github.sha }}

      # Git for Windows ships bash + jq + curl on the runner image, so the
      # composite's bash implementation works here too.
      - name: Post Discord embed (Windows artifact)
        if: ${{ success() }}
        uses: ./.github/actions/discord-notify
        with:
          bot-token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel-id: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          title: "🪟 Windows build ready"
          color: "5793266" # 0x5865F2 blurple
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          description: |
            🧪 Fresh `.exe` + `.msi` artifact attached to the workflow run.

            📦 [Download `windows-exe-${{ github.sha }}` from the workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (sign-in required, 30-day retention).

            📝 **Changelog**
            ${{ steps.changelog.outputs.changelog }}

  # ── iOS .ipa (SideStore) ───────────────────────────────────────────
  # Unsigned IPA for sideloading via SideStore, which re-signs on-device
  # with the user's own Apple ID. Mobile builds neither host Forge rooms
  # nor need the GraalVM harness, so this job skips GraalVM/Maven entirely
  # (tauri.ios.conf.json overrides beforeBuildCommand to `yarn vite:build`).
  ios-ipa:
    name: Build iOS .ipa
    # Pinned to macos-15 (Xcode 16.4): Xcode 26 (macos-latest/macos-26) dropped
    # the swiftCompatibility* libs that swift-rs-built objects still reference,
    # so the archive link fails — tauri-apps/tauri#15066. Re-evaluate on a
    # tauri/rustc fix; sideloaded unsigned IPAs are exempt from the App Store
    # iOS-26-SDK deadline.
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-ios

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      # tauri.ios.conf.json bundles resources/cardset.rkyv; the tauri CLI
      # validates it before cargo build (where src-tauri/build.rs would
      # otherwise produce it), so a clean runner needs it built up front.
      - name: Build cardset archive
        run: |
          cargo run -p forge-cardset-archive --features build --release \
            --bin build-cardset-archive

      - name: Tauri build (iOS, unsigned)
        run: yarn tauri ios build --no-sign

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: src-tauri/gen/apple/build/arm64/*.ipa
          if-no-files-found: error
          retention-days: 30

  # ── Android .apk ───────────────────────────────────────────────────
  # arm64 APK attached to the GitHub Release. Like iOS, Android hosts no
  # Forge rooms and skips the GraalVM harness (tauri.android.conf.json
  # overrides beforeBuildCommand); the card DB is embedded in the binary
  # (card_db.rs) since APK assets can't be mmap'd. The SDK + an NDK ship
  # preinstalled on ubuntu-latest; scripts/mobile-dev.mjs derives
  # ANDROID_HOME / NDK_HOME. The release APK is unsigned — a keystore
  # secret would be needed to produce an installable signed build.
  android-apk:
    name: Build Android .apk
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          clean: true
          fetch-depth: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: tauri-android

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1

      - run: yarn

      - name: Build WASM + bundle cards
        run: yarn build:wasm

      # card_db.rs include_bytes!es resources/cardset.rkyv on Android; build
      # it up front so a clean runner doesn't depend on build.rs ordering.
      - name: Build cardset archive
        run: |
          cargo run -p forge-cardset-archive --features build --release \
            --bin build-cardset-archive

      - name: Tauri build (Android APK, arm64)
        run: node scripts/mobile-dev.mjs android build --apk --target aarch64

      - name: Upload .apk
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

  # ── Publish GitHub Release ─────────────────────────────────────────
  # Downloads the artifacts built above, generates the updater manifest,
  # and attaches everything to the GitHub Release xtask created for the tag.
  release:
    name: Publish GitHub Release
    needs: [macos-dmg, windows-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg-${{ github.sha }}
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          path: release-assets/windows

      - name: Generate updater manifest (tauri.json)
        run: node scripts/gen-updater-manifest.mjs --tag "${{ github.ref_name }}" --assets release-assets --out release-assets/tauri.json

      # Attach artifacts to the release release-please already created from
      # CHANGELOG.md. Omitting `body` makes softprops/action-gh-release leave
      # the existing release notes untouched.
      - name: Attach artifacts to release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.app.tar.gz
            release-assets/macos/**/*.app.tar.gz.sig
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.exe.sig
            release-assets/windows/**/*.msi
            release-assets/tauri.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release body for Discord
        id: relbody
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          BODY=$(gh release view "$TAG" --json body --jq .body 2>/dev/null || echo '')
          {
            echo 'body<<RELBODY_EOF'
            echo "$BODY"
            echo 'RELBODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Discord embed (release published)
        if: steps.publish.outputs.url != ''
        uses: ./.github/actions/discord-notify
        with:
          bot-token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel-id: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          title: ${{ (contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) && format('🧪 manabrew {0} (pre-release)', github.ref_name) || format('🎁 manabrew {0} released', github.ref_name) }}
          color: ${{ (contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha')) && '16753920' || '5763719' }} # orange / green
          url: ${{ steps.publish.outputs.url }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          description: |
            📥 Public download (no GitHub account needed): ${{ steps.publish.outputs.url }}
            📝 **Changelog**
            ${{ steps.relbody.outputs.body }}

  # ── Attach mobile artifacts to the Release ─────────────────────────
  # Uploads the iOS .ipa and Android .apk to the published Release. Kept
  # OUT of the `release` job's `needs` so a flaky mobile build never blocks
  # the desktop installers: this job runs after `release` regardless of the
  # mobile jobs' results (`if: always()`), downloads whichever artifacts
  # exist, and uploads each — a missing one is skipped, not fatal.
  release-mobile:
    name: Attach mobile artifacts to release
    needs: [release, ios-ipa, android-apk]
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download iOS IPA
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: mobile/ios

      - name: Download Android APK
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: mobile/android

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          shopt -s globstar nullglob
          files=(mobile/ios/**/*.ipa mobile/android/**/*.apk)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No mobile artifacts found — both mobile builds failed?"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber --repo "$REPO"
          done

  # ── Early web deploy gate ──────────────────────────────────────────
  # Decides whether the web stack can ship BEFORE the installer builds
  # finish. Safe iff no crate an already-installed client talks to took a
  # semver-incompatible bump since the previous release — otherwise an old
  # desktop/mobile app would face a relay/hub it can't talk to, with no
  # updated installer to move to yet. The per-crate versions in
  # ops/manifest.json (maintained by `cargo xtask release`) are the signal.
  deploy-gate:
    name: Early web deploy gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare client-facing crate versions with the previous release
        id: gate
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 --match 'v[0-9]*' "${TAG}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release tag found — taking the safe deploy-last path."
            echo "early=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          early=true
          for crate in manabrew-protocol manabrew-server manabrew-hub; do
            old=$(git show "${PREV}:ops/manifest.json" | jq -r --arg c "$crate" '.packages[$c] // empty')
            new=$(git show "${TAG}:ops/manifest.json" | jq -r --arg c "$crate" '.packages[$c] // empty')
            if [ -z "$old" ] || [ -z "$new" ]; then
              echo "$crate: missing from a manifest — taking the safe path."
              early=false
              break
            fi
            IFS=. read -r omaj omin _ <<< "$old"
            IFS=. read -r nmaj nmin _ <<< "$new"
            # Cargo semver compatibility: 0.x crates break on minor bumps too.
            if [ "$omaj" != "$nmaj" ] || { [ "$nmaj" = "0" ] && [ "$omin" != "$nmin" ]; }; then
              echo "$crate: $old → $new is semver-incompatible."
              early=false
              break
            fi
          done
          echo "previous=$PREV early=$early"
          echo "early=$early" >> "$GITHUB_OUTPUT"
    outputs:
      early: ${{ steps.gate.outputs.early }}

  # ── Early web deploy ───────────────────────────────────────────────
  # Ships the web/relay/hub stack as soon as the tag lands instead of after
  # the ~60–90 min installer builds. deploy.sh's ghcr pull-retry loop waits
  # out docker-images.yml, so web players get the release roughly when the
  # images finish building. HOLD_MANIFEST keeps the served /manifest.json
  # (what installed apps poll to nag about updates) at the previous release
  # until the final deploy job releases it — /tauri.json redirects to the
  # *latest* GitHub Release's assets, which don't exist yet at this point.
  deploy-web:
    name: Deploy web (early)
    needs: [deploy-gate]
    if: needs.deploy-gate.outputs.early == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: wasm-deploy
      cancel-in-progress: false
    steps:
      # The composite actions need the repo present.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: SSH and run deploy.sh (manifest held back)
        id: deploy
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # ServerAliveInterval/CountMax keep the SSH connection healthy
          # while deploy.sh has quiet stretches (docker pulls, ghcr retry
          # sleeps). Without them the runner's SSH client times out after
          # a few minutes idle and we get `client_loop: send disconnect:
          # Broken pipe` mid-deploy.
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              "$USER@$HOST" \
            "cd '$DEPLOY_PATH' && HOLD_MANIFEST=1 ./deploy.sh 2>&1" 2>&1 | tee deploy.log
          exit ${PIPESTATUS[0]}

      - name: Fetch raw deploy log on failure
        if: steps.deploy.outcome != 'success'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        continue-on-error: true
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$USER@$HOST:/tmp/deploy-raw.log" deploy-raw.log || \
            echo "(raw log not retrievable from server)"

      - name: Post Discord embed (as bot)
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          bot-token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel-id: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          title: ${{ steps.deploy.outcome == 'success' && '🌐 Early web deploy successful' || '💥 Early web deploy failed' }}
          color: ${{ steps.deploy.outcome == 'success' && '5763719' || '15548997' }} # green / red
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          description: "(no log captured — SSH step failed before any output; see workflow run)"
          description-file: deploy.log
          attach-file: deploy-raw.log

      - name: Fail job if deploy failed
        if: steps.deploy.outcome != 'success'
        run: |
          echo "deploy step outcome: ${{ steps.deploy.outcome }}"
          exit 1

  # ── Deploy production (finalize) ───────────────────────────────────
  # Runs once the Release has all its installer artifacts. On the early
  # path this is a near-no-op that releases the held /manifest.json; on the
  # gated (semver-incompatible) path it is the full deploy, running LAST so
  # the tauri.json redirect never points at assets that don't exist yet.
  # FORCE_DEPLOY re-runs a deploy whose early attempt failed after pulling
  # (deploy.sh would otherwise early-exit on "no new commits"). Job-level
  # concurrency serializes deploys across runs (two tags in flight must not
  # deploy concurrently).
  deploy:
    name: Deploy production
    needs: [release, deploy-gate, deploy-web]
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: wasm-deploy
      cancel-in-progress: false
    steps:
      # The composite actions need the repo present.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: SSH and run deploy.sh
        id: deploy
        continue-on-error: true
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          TAG: ${{ github.ref_name }}
          FORCE_DEPLOY: ${{ needs.deploy-web.result == 'failure' && '1' || '' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # ServerAliveInterval/CountMax keep the SSH connection healthy
          # while deploy.sh has quiet stretches (docker pulls, ghcr retry
          # sleeps). Without them the runner's SSH client times out after
          # a few minutes idle and we get `client_loop: send disconnect:
          # Broken pipe` mid-deploy.
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              "$USER@$HOST" \
            "cd '$DEPLOY_PATH' && FORCE_DEPLOY='$FORCE_DEPLOY' ./deploy.sh 2>&1 && ./deploy.sh --release-manifest '$TAG' 2>&1" 2>&1 | tee deploy.log
          exit ${PIPESTATUS[0]}

      - name: Fetch raw deploy log on failure
        if: steps.deploy.outcome != 'success'
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        continue-on-error: true
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$USER@$HOST:/tmp/deploy-raw.log" deploy-raw.log || \
            echo "(raw log not retrievable from server)"

      - name: Post Discord embed (as bot)
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          bot-token: ${{ secrets.DISCORD_BOT_TOKEN }}
          channel-id: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          title: ${{ steps.deploy.outcome == 'success' && '🚀 Wasm deploy successful' || '💥 Wasm deploy failed' }}
          color: ${{ steps.deploy.outcome == 'success' && '5763719' || '15548997' }} # green / red
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          actor: ${{ github.actor }}
          sha: ${{ github.sha }}
          description: "(no log captured — SSH step failed before any output; see workflow run)"
          description-file: deploy.log
          attach-file: deploy-raw.log

      - name: Fail job if deploy failed
        if: steps.deploy.outcome != 'success'
        run: |
          echo "deploy step outcome: ${{ steps.deploy.outcome }}"
          exit 1

  # ── Publish SideStore source (runs after web deploy) ───────────────
  # Ships the unsigned iOS IPA + a regenerated apps.json to the deploy
  # host's ops/sidestore/ dir, bind-mounted into the caddy container at
  # /srv/manabrew/sidestore (compose.production.yml). Runs after `deploy`
  # so the /sidestore Caddy route and the bind-mount are live before the
  # files land. SideStore source URL: play.manabrew.app/sidestore/apps.json.
  deploy-sidestore:
    name: Publish SideStore source
    needs: [deploy, ios-ipa]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: sidestore-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: ipa

      - name: Stage SideStore artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sidestore-out
          cp "$(find ipa -name '*.ipa' | head -1)" "sidestore-out/Manabrew-${VERSION}.ipa"
          cp src-tauri/icons/512x512.png sidestore-out/icon.png
          node scripts/gen-sidestore-source.mjs \
            --tag "$GITHUB_REF_NAME" \
            --ipa "sidestore-out/Manabrew-${VERSION}.ipa" \
            --out sidestore-out/apps.json \
            --date "$(date -u +%Y-%m-%d)"

      - name: Rsync to deploy host
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --chmod=F644 \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            sidestore-out/ "$USER@$HOST:$DEPLOY_PATH/ops/sidestore/"
