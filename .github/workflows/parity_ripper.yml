name: Parity tests go BRRRR

on:
  # pull_request:
  #   paths:
  #     - "forge/**"
  #     - "forge-engine/**"
  #     - "Cargo.toml"
  #     - "Cargo.lock"
  #     - ".github/workflows/parity-self-hosted.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-matrix:
    runs-on: [self-hosted, unix]
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load regression matrix from JSON
        id: load
        run: |
          MATRIX_FILE="forge-engine/crates/forge-parity/regression.json"
          if [ ! -s "$MATRIX_FILE" ]; then
            echo "Matrix file missing or empty: $MATRIX_FILE" >&2
            exit 1
          fi
          {
            echo "matrix<<EOF"
            cat "$MATRIX_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  parity:
    needs: prepare-matrix
    runs-on: [self-hosted, unix]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Java cache
        uses: actions/cache@v4
        with:
          path: .parity-cache
          key: parity-java-${{ hashFiles('forge/forge-harness/src/**', 'forge/forge-game/src/**', 'forge/forge-core/src/**', 'forge/forge-ai/src/**', 'preset_decks/**') }}

      - name: Build Java parity harness JAR
        working-directory: forge
        run: mvn -pl forge-harness -am -DskipTests package

      - name: Run parity regression (${{ matrix.name }})
        run: |
          timeout --signal=TERM --kill-after=30s 10m \
            cargo run -p forge-parity --bin forge-parity -- \
              ${{ matrix.args }} \
              --java-jar forge/forge-harness/target/forge-harness-jar-with-dependencies.jar
