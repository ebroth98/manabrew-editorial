# ──────────────────────────────────────────────────────────────────
# Parity dashboard control via .env:
#
#   Deploy WITH dashboard (default):
#     COMPOSE_PROFILES=parity          (in .env)
#     docker compose up
#
#   Deploy WITHOUT dashboard:
#     remove COMPOSE_PROFILES from .env (or set it empty)
#     docker compose up
#
#   Or override on the CLI:
#     docker compose --profile parity up
# ──────────────────────────────────────────────────────────────────

services:
  forge-server:
    build:
      context: ../../.. # repo root (needs Cargo workspace + forge-engine/)
      dockerfile: forge-engine/crates/forge-server/Dockerfile
    ports:
      - "9443:9443"
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_MAX_ROOMS: "100"
      FORGE_SERVER_KEY: "${FORGE_SERVER_KEY:-forge}"
      SECRET_MANABREW_KEY: "${SECRET_MANABREW_KEY:-}"
      RUST_LOG: "forge_server=info"
    restart: on-failure:5

  # Headless engine node: creates a hosted room on the relay and runs the
  # Rust engine for it, so web "Play vs AI" (VITE_HOSTED_AI_ENABLED) has a
  # room to join and a server-side opponent to spawn.
  self-hosted-node:
    build:
      context: ../../.. # repo root (needs Cargo workspace + forge-engine/ + forge/ + public/preset_decks/)
      dockerfile: forge-engine/crates/self-hosted-node/Dockerfile
    environment:
      SELF_HOSTED_NODE_RELAY_URL: "ws://forge-server:9443"
      SELF_HOSTED_NODE_SERVER_KEY: "${FORGE_SERVER_KEY:-forge}"
      SELF_HOSTED_NODE_OFFICIAL_KEY: "${SECRET_MANABREW_KEY:-}"
      SELF_HOSTED_NODE_FORMAT: "${SELF_HOSTED_NODE_FORMAT:-commander}"
      SELF_HOSTED_NODE_MAX_PLAYERS: "${SELF_HOSTED_NODE_MAX_PLAYERS:-2}"
      RUST_LOG: "self_hosted_node=info,forge_bot=info"
    depends_on:
      - forge-server
    restart: on-failure:5

  manabrew:
    build:
      context: ../../.. # repo root (needs forge-engine/ + src/ + scripts/ + forge/ + public/preset_decks/)
      dockerfile: Dockerfile.web
      args:
        # Off by default: web "Play vs AI" runs the engine client-side and does
        # NOT need the self-hosted-node. Build with VITE_HOSTED_AI_ENABLED=true
        # (and run the node) to expose the Settings engine toggle. Relay is
        # left unset → the dev bundle falls back to localhost:9443.
        VITE_HOSTED_AI_ENABLED: "${VITE_HOSTED_AI_ENABLED:-false}"
    ports:
      - "1420:443"
      - "1421:80"
    # The image bakes Caddy's default config; mount a localhost Caddyfile so
    # `docker compose up` actually serves the app (with the COOP/COEP headers
    # SharedArrayBuffer needs) on http://localhost:1421. Production mounts the
    # public-domain ops/Caddyfile instead.
    volumes:
      - ../../../ops/Caddyfile.local:/etc/caddy/Caddyfile:ro
    restart: on-failure:5

  parity-dashboard:
    profiles:
      - parity
    build:
      context: ../../.. # repo root (needs Cargo workspace + forge/ + public/preset_decks/)
      dockerfile: forge-engine/crates/forge-parity/Dockerfile
    ports:
      - "8080:8080"
    mem_limit: 3g
    memswap_limit: 3g
    environment:
      PORT: "8080"
      THRESHOLD: "0.90"
      MAX_TURNS: "10"
      FUZZ_PER_BATCH: "0"
      JAVA_HEAP: "${JAVA_HEAP:-512m}"
      # MAX_GAMES: ""          # omit for unlimited
      # DECKS: ""              # omit for all presets
      ANALYZE: "${ANALYZE:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      OPENAI_CTX_SIZE: "${OPENAI_CTX_SIZE:-4096}"
      MTG_RULES_PATH: "/app/mtg_rules.txt"
      POLL_INTERVAL: "${POLL_INTERVAL:-}"
      ISSUE_THRESHOLD: "${ISSUE_THRESHOLD:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_REPO: "${GITHUB_REPO:-}"
    volumes:
      - parity-data:/app/data
    restart: on-failure:5

volumes:
  parity-data:
