services:
  forge-server:
    build: .
    ports:
      - "9443:9443"
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_MAX_ROOMS: "100"
      FORGE_SERVER_KEY: "forge"
      RUST_LOG: "forge_server=info"
    restart: unless-stopped

  parity-dashboard:
    build:
      context: ../../..        # repo root (needs Cargo workspace + forge/ + preset_decks/)
      dockerfile: forge-engine/crates/forge-parity/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      THRESHOLD: "0.90"
      MAX_TURNS: "10"
      FUZZ_PER_BATCH: "0"
      # MAX_GAMES: ""          # omit for unlimited
      # DECKS: ""              # omit for all presets
      ANALYZE: "${ANALYZE:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_BASE: "${OPENAI_API_BASE:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      POLL_INTERVAL: "${POLL_INTERVAL:-}"
      ISSUE_THRESHOLD: "${ISSUE_THRESHOLD:-}"
    volumes:
      - parity-data:/app/data
    restart: unless-stopped

volumes:
  parity-data:
