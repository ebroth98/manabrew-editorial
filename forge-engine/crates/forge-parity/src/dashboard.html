<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forge Parity Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
  header h1 { font-size: 20px; font-weight: 600; }
  header .status { font-size: 14px; color: var(--text-muted); }

  /* ── Control Panel ───────────────────────────────────── */
  .control-panel {
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    padding: 12px 16px; margin: 12px 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px;
  }
  .control-group { display: flex; align-items: center; gap: 8px; }
  .control-group label { color: var(--text-muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap; }

  /* Segmented buttons */
  .seg-btns { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .seg-btns button { background: var(--bg); color: var(--text-muted); border: none;
    padding: 4px 12px; font-size: 12px; cursor: pointer; border-right: 1px solid var(--border); }
  .seg-btns button:last-child { border-right: none; }
  .seg-btns button.active { background: var(--accent); color: #fff; }
  .seg-btns button:hover:not(.active) { background: var(--surface); color: var(--text); }

  /* Toggle switch */
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--border); border-radius: 10px; transition: 0.2s; }
  .toggle .slider::before { content: ''; position: absolute; height: 14px; width: 14px;
    left: 3px; bottom: 3px; background: var(--text-muted); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(16px); background: #fff; }

  /* Text input */
  .ctrl-input { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 4px 8px; font-size: 12px; width: 120px;
    font-family: 'SF Mono', 'Menlo', monospace; }
  .ctrl-input:focus { outline: none; border-color: var(--accent); }

  .btn-sm { background: var(--accent); color: #fff; border: none; border-radius: 4px;
    padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }
  .btn-sm:hover { opacity: 0.9; }
  .btn-sm.danger { background: var(--red); }
  .btn-sm.success { background: var(--green); }

  /* ── Tabs ─────────────────────────────────────────────── */
  .tab-nav {
    display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 16px 0 0 0;
  }
  .tab-btn {
    background: none; border: none; color: var(--text-muted); padding: 10px 20px;
    font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
    font-weight: 500; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding-top: 20px; }
  .tab-content.active { display: block; }

  /* ── Stats ───────────────────────────────────────────── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; }
  .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.yellow { color: var(--yellow); }

  .chart-container { background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 24px; }
  .chart-container h2 { font-size: 14px; margin-bottom: 12px; }
  .chart-container canvas { max-height: 300px; }

  .section { background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 24px; overflow-x: auto; }
  .section h2 { font-size: 14px; margin-bottom: 12px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; padding: 8px; color: var(--text-muted); border-bottom: 1px solid var(--border);
    font-weight: 500; font-size: 12px; text-transform: uppercase; white-space: nowrap; }
  td { padding: 8px; border-bottom: 1px solid var(--border); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; max-width: 0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge.pass { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.fail { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge.error { background: rgba(210,153,34,0.15); color: var(--yellow); }

  .heatmap-wrapper { overflow-x: auto; margin-top: 8px; }
  .heatmap { display: grid; gap: 2px; min-width: max-content; }
  .heatmap-cell { padding: 4px 2px; text-align: center; font-size: 10px; border-radius: 4px;
    font-weight: 600; min-width: 48px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; }
  .refresh-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ── Failures tab filter ──────────────────────────────── */
  .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .filter-bar select { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 4px 8px; font-size: 12px; }
  .failure-row:hover { background: var(--surface); }
  .failure-row:hover td { background: var(--surface); }

  /* ── Cluster cards ───────────────────────────────────── */
  .cluster-cards { display: grid; gap: 12px; }
  .cluster-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .cluster-card .cluster-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cluster-card .cluster-field { font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; color: var(--accent); }
  .cluster-card .cluster-count { font-size: 12px; font-weight: 600; color: var(--red); }
  .cluster-card .cluster-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .cluster-card .cluster-analysis { font-size: 12px; line-height: 1.6; color: var(--text); }
  .cluster-card .cluster-analysis strong { color: var(--accent); }
  .cluster-card .cluster-files { font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px;
    color: var(--text-muted); margin-top: 6px; }
  .cluster-card .severity-badge { display: inline-block; padding: 1px 6px; border-radius: 8px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; margin-left: 8px; }
  .severity-badge.high { background: rgba(248,81,73,0.2); color: var(--red); }
  .severity-badge.medium { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .severity-badge.low { background: rgba(63,185,80,0.2); color: var(--green); }

  /* ── Logs tab ─────────────────────────────────────────── */
  .log-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .log-container {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; max-height: 600px; overflow-y: auto; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 11px; line-height: 1.7;
  }
  .log-container.follow { /* JS sets scroll to bottom */ }
  .log-line { white-space: pre-wrap; word-break: break-all; }
  .log-line .log-ts { color: var(--text-muted); }
  .log-line .log-level { font-weight: 700; display: inline-block; width: 5ch; }
  .log-line .log-level.ERROR { color: var(--red); }
  .log-line .log-level.WARN { color: var(--yellow); }
  .log-line .log-level.INFO { color: var(--green); }
  .log-line .log-level.DEBUG { color: var(--accent); }
  .log-line .log-level.TRACE { color: var(--text-muted); }
  .log-line .log-target { color: var(--text-muted); }
  .log-line .log-msg { color: var(--text); }

  /* ── Trace diff ─────────────────────────────────────── */
  .diff-line { padding: 1px 12px; white-space: pre-wrap; word-break: break-all; }
  .diff-line.add { background: rgba(63,185,80,0.12); color: var(--green); }
  .diff-line.del { background: rgba(248,81,73,0.12); color: var(--red); }
  .diff-line.ctx { color: var(--text-muted); }
  .diff-line.hdr { background: rgba(88,166,255,0.1); color: var(--accent); font-weight: 600;
    padding: 6px 12px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .diff-line .ln { display: inline-block; width: 5ch; color: var(--text-muted); opacity: 0.5;
    text-align: right; margin-right: 8px; user-select: none; }

  /* ── Analysis controls ───────────────────────────────── */
  .analysis-controls {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 12px 16px; margin-bottom: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px;
  }
  .analysis-controls .status-dot { display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; margin-right: 4px; }
  .analysis-controls .status-dot.on { background: var(--green); }
  .analysis-controls .status-dot.off { background: var(--text-muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Forge Parity Dashboard <span id="commit-sha" style="font-size:11px;color:var(--text-muted);font-weight:400;font-family:'SF Mono','Menlo',monospace;margin-left:8px"></span></h1>
    <div class="status" id="uptime">Loading...</div>
  </header>

  <!-- Control Panel -->
  <div class="control-panel" id="control-panel">
    <div class="control-group">
      <label>Games/Matchup</label>
      <div class="seg-btns" id="games-seg">
        <button data-val="1">1</button>
        <button data-val="5">5</button>
        <button data-val="10" class="active">10</button>
        <button data-val="30">30</button>
      </div>
    </div>
    <div class="control-group">
      <label>Time Range</label>
      <div class="seg-btns" id="time-range-seg">
        <button data-val="today" class="active">Today</button>
        <button data-val="24h">24h</button>
        <button data-val="7d">7d</button>
        <button data-val="all">All</button>
      </div>
    </div>
    <div class="control-group">
      <label>Fuzz Decks</label>
      <label class="toggle"><input type="checkbox" id="fuzz-toggle"><span class="slider"></span></label>
    </div>
    <div class="control-group">
      <label>Self-matchups</label>
      <label class="toggle"><input type="checkbox" id="self-matchup-toggle" checked><span class="slider"></span></label>
    </div>
  </div>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="games">Games</button>
    <button class="tab-btn" data-tab="failures">Failures</button>
    <button class="tab-btn" data-tab="analysis">Analysis</button>
    <button class="tab-btn" data-tab="logs">Logs</button>
  </nav>

  <!-- ═══ Games Tab ═══ -->
  <div class="tab-content active" id="tab-games">
    <div class="stats-grid" id="stats-grid"></div>

    <div id="fuzz-stats-bar" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--text-muted)">
      <span style="color:var(--yellow);font-weight:600">Fuzz Testing:</span>
      <span id="fuzz-stats-text"></span>
      <details id="fuzz-games-details" style="margin-top:8px;display:none">
        <summary style="cursor:pointer;color:var(--text-muted);font-size:12px;user-select:none">Recent fuzz games</summary>
        <div id="fuzz-games-list" style="margin-top:8px;max-height:200px;overflow-y:auto;font-family:'SF Mono','Menlo',monospace;font-size:11px;line-height:1.7"></div>
      </details>
    </div>

    <div class="chart-container">
      <h2 id="trend-title">Pass Rate Trend (Hourly)</h2>
      <canvas id="trend-chart"></canvas>
    </div>

    <div class="section">
      <h2>Deck Pair Matrix <span id="fuzz-badge" style="display:none;background:rgba(210,153,34,0.2);color:var(--yellow);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-left:8px;vertical-align:middle">FUZZ ENABLED</span></h2>
      <div id="matrix-container"></div>
    </div>
  </div>

  <!-- ═══ Failures Tab ═══ -->
  <div class="tab-content" id="tab-failures">
    <div class="filter-bar">
      <label style="color:var(--text-muted);font-size:12px">Filter by deck pair:</label>
      <select id="failure-deck-filter"><option value="">All</option></select>
    </div>
    <div class="section" style="margin-bottom:0">
      <h2>Recent Failures</h2>
      <table id="failures-table">
        <colgroup>
          <col style="width:50px"><col style="width:50px"><col style="width:15%"><col style="width:15%">
          <col style="width:70px"><col style="width:60px"><col style="width:auto"><col style="width:140px">
        </colgroup>
        <thead><tr><th>ID</th><th>Batch</th><th>Deck 1</th><th>Deck 2</th><th>Seed</th><th>Status</th><th>Divergence</th><th>Time</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- ═══ Analysis Tab ═══ -->
  <div class="tab-content" id="tab-analysis">
    <div class="analysis-controls">
      <div class="control-group">
        <span id="analysis-status-indicator"><span class="status-dot off"></span> Paused</span>
        <button class="btn-sm" id="analysis-toggle-btn">Start</button>
      </div>
      <div class="control-group" style="margin-left:auto">
        <label>Backend</label>
        <span class="mono" id="analysis-backend" style="color:var(--text-muted)">detecting...</span>
      </div>
      <div class="control-group">
        <label>Model</label>
        <select class="ctrl-input" id="llm-model-select" style="width:180px"></select>
      </div>
    </div>

    <div id="clusters-section">
      <div class="section">
        <h2>AI Failure Analysis</h2>
        <div id="clusters-analyzed"></div>
        <details id="clusters-pending-details" style="margin-top:16px;display:none">
          <summary style="cursor:pointer;color:var(--text-muted);font-size:13px;user-select:none" id="clusters-pending-summary">Pending analysis (0)</summary>
          <div id="clusters-pending" style="margin-top:10px"></div>
        </details>
      </div>
    </div>
  </div>


  <!-- ═══ Logs Tab ═══ -->
  <div class="tab-content" id="tab-logs">
    <div class="log-controls">
      <div class="control-group">
        <label>Level</label>
        <select class="ctrl-input" id="log-level-filter" style="width:90px">
          <option value="">All</option>
          <option value="ERROR">ERROR</option>
          <option value="WARN">WARN</option>
          <option value="INFO" selected>INFO</option>
          <option value="DEBUG">DEBUG</option>
          <option value="TRACE">TRACE</option>
        </select>
      </div>
      <div class="control-group">
        <label>Search</label>
        <input type="text" class="ctrl-input" id="log-search" placeholder="filter..." style="width:200px">
      </div>
      <div class="control-group">
        <label>Auto-scroll</label>
        <label class="toggle"><input type="checkbox" id="log-follow" checked><span class="slider"></span></label>
      </div>
      <button class="btn-sm" id="log-clear" style="margin-left:auto">Clear</button>
    </div>
    <div class="section" style="padding:0;margin-bottom:0">
      <div class="log-container" id="log-container"></div>
    </div>
  </div>

  <p class="refresh-note">Auto-refreshes every 10 seconds</p>
</div>

<script>
let trendChart = null;
let allFailures = []; // cached for filtering
let currentTimeRange = 'today'; // today, 24h, 7d, all

function getSinceISO() {
  const now = new Date();
  switch (currentTimeRange) {
    case 'today': {
      const d = new Date(now);
      d.setHours(0, 0, 0, 0);
      return d.toISOString();
    }
    case '24h': return new Date(now.getTime() - 24*60*60*1000).toISOString();
    case '7d': return new Date(now.getTime() - 7*24*60*60*1000).toISOString();
    default: return null; // 'all'
  }
}

function sinceParam(prefix = '?') {
  const s = getSinceISO();
  return s ? `${prefix}since=${encodeURIComponent(s)}` : '';
}

function fmt(n) { return n.toLocaleString(); }
function pct(n) { return (n * 100).toFixed(1) + '%'; }
function uptimeFmt(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm ' + (s%60) + 's';
  const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60);
  return h + 'h ' + m + 'm';
}

function passColor(rate) {
  if (rate >= 0.95) return 'rgba(63,185,80,0.7)';
  if (rate >= 0.8) return 'rgba(210,153,34,0.5)';
  return 'rgba(248,81,73,0.5)';
}

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

async function postJson(url, body) {
  const r = await fetch(url, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

// ── Tabs ──────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ── Control Panel ─────────────────────────────────────────
// Time range segmented buttons
document.querySelectorAll('#time-range-seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#time-range-seg button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTimeRange = btn.dataset.val;
    refresh();
  });
});

// Games per matchup segmented buttons
document.querySelectorAll('#games-seg button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#games-seg button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    postJson('/api/config', { games_per_matchup: parseInt(btn.dataset.val) });
  });
});

// Fuzz toggle
document.getElementById('fuzz-toggle').addEventListener('change', function() {
  postJson('/api/config', { fuzz_enabled: this.checked });
  document.getElementById('fuzz-badge').style.display = this.checked ? 'inline' : 'none';
});

// Self-matchups toggle
document.getElementById('self-matchup-toggle').addEventListener('change', function() {
  postJson('/api/config', { self_matchups: this.checked });
});

// LLM model selector
document.getElementById('llm-model-select').addEventListener('change', function() {
  if (this.value) postJson('/api/config', { llm_model: this.value });
});

// Analysis toggle
document.getElementById('analysis-toggle-btn').addEventListener('click', async () => {
  const result = await postJson('/api/analysis/toggle', {});
  updateAnalysisUI(result.running);
});

function updateAnalysisUI(running) {
  const indicator = document.getElementById('analysis-status-indicator');
  const btn = document.getElementById('analysis-toggle-btn');
  if (running) {
    indicator.innerHTML = '<span class="status-dot on"></span> Running';
    btn.textContent = 'Stop';
    btn.className = 'btn-sm danger';
  } else {
    indicator.innerHTML = '<span class="status-dot off"></span> Paused';
    btn.textContent = 'Start';
    btn.className = 'btn-sm success';
  }
}

// ── Data refresh ──────────────────────────────────────────
async function updateModels() {
  try {
    const data = await fetchJson('/api/models');
    const sel = document.getElementById('llm-model-select');
    const curVal = sel.value;
    if (data.models && data.models.length > 0) {
      sel.innerHTML = data.models.map(m =>
        `<option value="${m}"${m === curVal ? ' selected' : ''}>${m}</option>`
      ).join('');
      // If current config model isn't in the list, prepend it
      if (curVal && !data.models.includes(curVal)) {
        sel.insertAdjacentHTML('afterbegin', `<option value="${curVal}" selected>${curVal}</option>`);
      }
    }
  } catch(e) {
    // LLM provider not reachable — leave dropdown as-is
    console.warn('Models fetch failed:', e);
  }
}

async function updateConfig() {
  try {
    const cfg = await fetchJson('/api/config');
    // Sync segmented buttons
    document.querySelectorAll('#games-seg button').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.val) === cfg.games_per_matchup);
    });
    document.getElementById('fuzz-toggle').checked = cfg.fuzz_enabled;
    document.getElementById('self-matchup-toggle').checked = cfg.self_matchups;
    // Show/hide fuzz badge
    document.getElementById('fuzz-badge').style.display = cfg.fuzz_enabled ? 'inline' : 'none';
    // Sync model dropdown
    const sel = document.getElementById('llm-model-select');
    if (sel.querySelector(`option[value="${cfg.llm_model}"]`)) {
      sel.value = cfg.llm_model;
    } else {
      // Model not yet in dropdown — add it
      sel.insertAdjacentHTML('afterbegin', `<option value="${cfg.llm_model}" selected>${cfg.llm_model}</option>`);
    }
    updateAnalysisUI(cfg.analysis_running);
  } catch(e) { console.error('Config error:', e); }
}

async function updateAnalysisStatus() {
  try {
    const s = await fetchJson('/api/analysis/status');
    document.getElementById('analysis-backend').textContent = s.backend;
    updateAnalysisUI(s.running);
  } catch(e) { console.error('Analysis status error:', e); }
}

async function updateStats() {
  try {
    const s = await fetchJson('/api/stats' + sinceParam());
    document.getElementById('uptime').textContent = 'Uptime: ' + uptimeFmt(s.uptime_seconds);
    if (s.commit_sha) {
      document.getElementById('commit-sha').textContent = '@' + s.commit_sha;
    }
    const rateClass = s.pass_rate >= 0.9 ? 'green' : s.pass_rate >= 0.7 ? 'yellow' : 'red';
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="label">Total Games</div><div class="value">${fmt(s.total_games)}</div></div>
      <div class="stat-card"><div class="label">Pass Rate</div><div class="value ${rateClass}">${pct(s.pass_rate)}</div></div>
      <div class="stat-card"><div class="label">Passed</div><div class="value green">${fmt(s.passed)}</div></div>
      <div class="stat-card"><div class="label">Failed</div><div class="value ${s.failed > 0 ? 'red' : ''}">${fmt(s.failed)}</div></div>
      <div class="stat-card"><div class="label">Errors</div><div class="value ${s.errors > 0 ? 'yellow' : ''}">${fmt(s.errors)}</div></div>
      <div class="stat-card"><div class="label">Games/min</div><div class="value">${s.games_per_minute.toFixed(1)}</div></div>

    } else if (fuzzEnabled) {

    } else {

}

async function updateTrend() {
  try {
    const bucket = currentTimeRange === '7d' ? 'day' : 'hour';
    const limit = currentTimeRange === '7d' ? 7 : currentTimeRange === 'all' ? 168 : 24;
    const titleMap = { today: 'Today', '24h': 'Last 24h', '7d': 'Last 7 Days', all: 'All Time' };
    document.getElementById('trend-title').textContent = `Pass Rate Trend — ${titleMap[currentTimeRange] || 'Hourly'}`;
    const data = await fetchJson(`/api/trend?bucket=${bucket}&limit=${limit}${sinceParam('&')}`);
    data.reverse();
    const labels = data.map(d => bucket === 'day'
      ? d.bucket
      : d.bucket.replace('T', ' ').replace(':00:00Z', 'h'));
    const passed = data.map(d => d.passed);
    const failed = data.map(d => d.failed);
    const errors = data.map(d => d.errors);
    const rates = data.map(d => d.pass_rate * 100);
    const ctx = document.getElementById('trend-chart').getContext('2d');
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Passed', data: passed, backgroundColor: '#238636', stack: 'games', yAxisID: 'y1', order: 2 },
          { label: 'Failed', data: failed, backgroundColor: '#da3633', stack: 'games', yAxisID: 'y1', order: 2 },
          { label: 'Errors', data: errors, backgroundColor: '#d29922', stack: 'games', yAxisID: 'y1', order: 2 },
          { label: 'Pass Rate %', data: rates, borderColor: '#58a6ff', backgroundColor: 'transparent',
            type: 'line', fill: false, tension: 0.3, yAxisID: 'y', order: 1, pointRadius: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          y: { min: 0, max: 100, position: 'right', grid: { display: false }, ticks: { color: '#58a6ff', callback: v => v + '%' } },
          y1: { stacked: true, position: 'left', grid: { color: '#21262d' }, ticks: { color: '#8b949e' },
                title: { display: true, text: 'Games', color: '#8b949e' } },
          x: { stacked: true, grid: { color: '#21262d' }, ticks: { color: '#8b949e', maxTicksLimit: 12 } }
        },
        plugins: { legend: { labels: { color: '#c9d1d9' } } }
      }
    });
  } catch(e) { console.error('Trend error:', e); }
}

async function updateMatrix() {
  try {
    const sinceISO = getSinceISO();
    const matrixUrl = sinceISO ? `/api/matrix?since=${encodeURIComponent(sinceISO)}` : '/api/matrix';
    const data = await fetchJson(matrixUrl);
    if (data.length === 0) {
      document.getElementById('matrix-container').innerHTML = '<p style="color:var(--text-muted)">No data yet</p>';
      return;
    }
    const decks = [...new Set(data.flatMap(d => [d.deck1, d.deck2]))].sort();
    const lookup = {};
    data.forEach(d => { lookup[d.deck1 + '|' + d.deck2] = d; });
    let html = `<div class="heatmap-wrapper"><div class="heatmap" style="grid-template-columns: 110px repeat(${decks.length}, minmax(48px, 1fr));">`;
    html += '<div></div>';
    decks.forEach(d => { html += `<div class="heatmap-cell" style="font-weight:500;color:var(--text-muted)">${d.length > 10 ? d.slice(0,10) + '...' : d}</div>`; });
    decks.forEach(d1 => {
      html += `<div class="heatmap-cell" style="font-weight:500;color:var(--text-muted);text-align:right">${d1.length > 10 ? d1.slice(0,10) + '...' : d1}</div>`;
      decks.forEach(d2 => {
        const entry = lookup[d1 + '|' + d2];
        if (d1 === d2 && !entry) {
          html += '<div class="heatmap-cell" style="background:#161b22">-</div>';
        } else if (entry) {
          html += `<div class="heatmap-cell" style="background:${passColor(entry.pass_rate)}" title="${entry.total} games">${pct(entry.pass_rate)}</div>`;
        } else {
          html += '<div class="heatmap-cell" style="background:var(--surface);color:var(--text-muted)">-</div>';
        }
      });
    });
    html += '</div></div>';
    document.getElementById('matrix-container').innerHTML = html;
  } catch(e) { console.error('Matrix error:', e); }
}

async function updateFailures() {
  try {
    const data = await fetchJson('/api/failures?limit=50');
    allFailures = data;
    // Populate deck pair filter dropdown
    const pairs = [...new Set(data.map(r => r.deck1 + ' vs ' + r.deck2))].sort();
    const sel = document.getElementById('failure-deck-filter');
    const curVal = sel.value;
    sel.innerHTML = '<option value="">All</option>' + pairs.map(p => `<option value="${p}">${p}</option>`).join('');
    sel.value = curVal; // restore selection
    renderFailures();
  } catch(e) { console.error('Failures error:', e); }
}

function renderFailures() {
  const filter = document.getElementById('failure-deck-filter').value;
  const filtered = filter
    ? allFailures.filter(r => (r.deck1 + ' vs ' + r.deck2) === filter)
    : allFailures;
  const tbody = document.querySelector('#failures-table tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text-muted);text-align:center">No failures</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => `<tr class="failure-row" data-run-id="${r.id}" style="cursor:pointer" title="Click to view trace">
    <td class="mono">${r.id}</td>
    <td>${r.batch_id}</td>
    <td>${r.deck1}</td>
    <td>${r.deck2}</td>
    <td class="mono">${r.seed}</td>
    <td><span class="badge ${r.status === 'pass' ? 'pass' : r.status === 'fail' ? 'fail' : 'error'}">${r.status}</span>${r.is_fuzz ? ' <span style="background:rgba(210,153,34,0.2);color:var(--yellow);padding:1px 5px;border-radius:8px;font-size:9px;font-weight:600">FUZZ</span>' : ''}</td>
    <td class="mono">${r.first_divergence_field || r.error_message || '-'}</td>
    <td style="color:var(--text-muted)">${r.timestamp.replace('T', ' ').slice(0, 19)}</td>
  </tr>
  <tr class="trace-row" id="trace-row-${r.id}" style="display:none">
    <td colspan="8" style="padding:0">
      <div class="inline-trace" style="background:var(--surface);border-top:1px solid var(--border);padding:8px 12px">
        <div class="trace-meta" style="font-size:12px;color:var(--text-muted);margin-bottom:8px"></div>
        <div class="trace-diff" style="font-size:11px;max-height:500px;overflow:auto;font-family:'SF Mono','Menlo','Consolas',monospace;line-height:1.6"></div>
      </div>
    </td>
  </tr>`).join('');

  // Attach click handlers to failure rows
  tbody.querySelectorAll('.failure-row').forEach(row => {
    row.addEventListener('click', () => toggleTrace(row.dataset.runId));
  });
}

async function toggleTrace(runId) {
  const traceRow = document.getElementById('trace-row-' + runId);
  if (!traceRow) return;
  // Toggle visibility
  if (traceRow.style.display !== 'none') {
    traceRow.style.display = 'none';
    return;
  }
  traceRow.style.display = '';
  const container = traceRow.querySelector('.inline-trace');
  const metaEl = container.querySelector('.trace-meta');
  const diffEl = container.querySelector('.trace-diff');
  // If already loaded, just show
  if (diffEl.innerHTML) return;
  metaEl.innerHTML = '<em>Loading trace...</em>';
  try {
    const run = await fetchJson(`/api/run/${runId}`);
    metaEl.innerHTML = `<strong>#${run.id}</strong> &middot; ${run.deck1} vs ${run.deck2} &middot; seed ${run.seed}` +
      (run.first_divergence_field ? ` &middot; divergence: <code>${run.first_divergence_field}</code> (Rust: <code>${run.first_divergence_rust}</code>, Java: <code>${run.first_divergence_java}</code>)` : '') +
      (run.error_message ? ` &middot; error: <code>${escapeHtml(run.error_message)}</code>` : '');
    const diffLines = computeDiff(run.rust_trace, run.java_trace);
    diffEl.innerHTML = renderDiff(diffLines);
  } catch(e) {
    metaEl.innerHTML = `<span style="color:var(--red)">Failed to load trace: ${escapeHtml(e.message)}</span>`;
  }
}

document.getElementById('failure-deck-filter').addEventListener('change', renderFailures);

      <div class="cluster-analysis">

        <strong>Root cause:</strong> ${a.root_cause}

async function updateClusters() {
  try {
    const data = await fetchJson('/api/clusters');
    const analyzed = data.filter(c => c.llm_analysis);
    const pending = data.filter(c => !c.llm_analysis);

    const analyzedEl = document.getElementById('clusters-analyzed');
    if (analyzed.length > 0) {
      analyzedEl.innerHTML = '<div class="cluster-cards">' + analyzed.map(renderAnalyzedCard).join('') + '</div>';
    } else {
      analyzedEl.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No fields analyzed yet — start analysis or wait for AI...</p>';
    }

    const pendingDetails = document.getElementById('clusters-pending-details');
    const pendingSummary = document.getElementById('clusters-pending-summary');
    const pendingEl = document.getElementById('clusters-pending');
    if (pending.length > 0) {
      pendingDetails.style.display = '';
      pendingSummary.textContent = `Pending analysis (${pending.length} divergence fields, ${pending.reduce((s,c) => s + c.total_failures, 0)} total failures)`;
      pendingEl.innerHTML = '<div class="cluster-cards">' + pending.map(renderPendingCard).join('') + '</div>';

}

// ── Logs ──────────────────────────────────────────────────
let logHighWatermark = 0;
const LOG_LEVELS = ['ERROR', 'WARN', 'INFO', 'DEBUG', 'TRACE'];

function logLevelPriority(level) {
  const idx = LOG_LEVELS.indexOf(level);
  return idx === -1 ? 99 : idx;
}

function renderLogLine(entry) {
  const ts = entry.ts.replace('T', ' ').slice(11, 23);
  const target = entry.target.length > 30 ? '...' + entry.target.slice(-27) : entry.target;
  return `<div class="log-line"><span class="log-ts">${ts}</span> <span class="log-level ${entry.level}">${entry.level.padEnd(5)}</span> <span class="log-target">${target}</span> <span class="log-msg">${escapeHtml(entry.message)}</span></div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function updateLogs() {
  try {
    const data = await fetchJson(`/api/logs?since=${logHighWatermark}&limit=500`);
    if (!data || data.length === 0) return;

    const filterLevel = document.getElementById('log-level-filter').value;
    const filterMinPriority = filterLevel ? logLevelPriority(filterLevel) : 99;
    const searchText = document.getElementById('log-search').value.toLowerCase();

    const container = document.getElementById('log-container');
    let html = '';
    for (const entry of data) {
      logHighWatermark = Math.max(logHighWatermark, entry.id);
      // Filter by level
      if (logLevelPriority(entry.level) > filterMinPriority) continue;
      // Filter by search text
      if (searchText && !entry.message.toLowerCase().includes(searchText) && !entry.target.toLowerCase().includes(searchText)) continue;
      html += renderLogLine(entry);
    }

    if (html) {
      container.insertAdjacentHTML('beforeend', html);
      // Cap DOM size: remove oldest lines if > 2000
      while (container.children.length > 2000) {
        container.removeChild(container.firstChild);
      }
      // Auto-scroll if follow enabled
      if (document.getElementById('log-follow').checked) {
        container.scrollTop = container.scrollHeight;
      }
    }
  } catch(e) { console.error('Logs error:', e); }
}

document.getElementById('log-clear').addEventListener('click', () => {
  document.getElementById('log-container').innerHTML = '';
});

// Re-fetch all logs when filters change (reset watermark to refetch with new filter)
document.getElementById('log-level-filter').addEventListener('change', () => {
  document.getElementById('log-container').innerHTML = '';
  logHighWatermark = 0;
  updateLogs();
});
document.getElementById('log-search').addEventListener('input', () => {
  document.getElementById('log-container').innerHTML = '';
  logHighWatermark = 0;
  updateLogs();
});

// ── Traces (inline in failures) ───────────────────────────

// Simple LCS-based unified diff
function computeDiff(rustText, javaText) {
  const a = (rustText || '').split('\n');
  const b = (javaText || '').split('\n');
  const n = a.length, m = b.length;

  // Myers-like: compute edit script using LCS DP (bounded for performance)
  // For very large traces, fall back to line-by-line comparison
  if (n + m > 4000) {
    return simpleDiff(a, b);
  }

  // LCS table
  const dp = Array(n + 1).fill(null).map(() => Array(m + 1).fill(0));
  for (let i = n - 1; i >= 0; i--) {
    for (let j = m - 1; j >= 0; j--) {
      if (a[i] === b[j]) dp[i][j] = dp[i+1][j+1] + 1;
      else dp[i][j] = Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }

  // Walk the DP table to produce diff hunks
  const lines = [];
  let i = 0, j = 0;
  while (i < n || j < m) {
    if (i < n && j < m && a[i] === b[j]) {
      lines.push({ type: 'ctx', text: a[i], ln1: i+1, ln2: j+1 });
      i++; j++;
    } else if (j < m && (i >= n || dp[i][j+1] >= dp[i+1][j])) {
      lines.push({ type: 'add', text: b[j], ln2: j+1 });
      j++;
    } else {
      lines.push({ type: 'del', text: a[i], ln1: i+1 });
      i++;
    }
  }
  return lines;
}

function simpleDiff(a, b) {
  const lines = [];
  const maxLen = Math.max(a.length, b.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < a.length && i < b.length && a[i] === b[i]) {
      lines.push({ type: 'ctx', text: a[i], ln1: i+1, ln2: i+1 });
    } else {
      if (i < a.length) lines.push({ type: 'del', text: a[i], ln1: i+1 });
      if (i < b.length) lines.push({ type: 'add', text: b[i], ln2: i+1 });
    }
  }
  return lines;
}

function renderDiff(diffLines) {
  // Group into hunks: show context lines around changes, collapse long identical sections
  const CONTEXT = 3;
  let html = '<div class="diff-line hdr">--- Rust trace</div><div class="diff-line hdr">+++ Java trace</div>';

  // Find change regions
  const isChange = diffLines.map(l => l.type !== 'ctx');
  const show = new Array(diffLines.length).fill(false);
  for (let i = 0; i < diffLines.length; i++) {
    if (isChange[i]) {
      for (let j = Math.max(0, i - CONTEXT); j <= Math.min(diffLines.length - 1, i + CONTEXT); j++) {
        show[j] = true;
      }
    }
  }

  // If no changes at all, show a few lines with a note
  if (!isChange.some(Boolean)) {
    html += '<div class="diff-line ctx" style="color:var(--green);padding:12px">Traces are identical</div>';
    return html;
  }

  let inHunk = false;
  for (let i = 0; i < diffLines.length; i++) {
    if (!show[i]) {
      if (inHunk) {
        html += '<div class="diff-line ctx" style="color:var(--text-muted);text-align:center;padding:4px">···</div>';
        inHunk = false;
      }
      continue;
    }
    inHunk = true;
    const l = diffLines[i];
    const ln1 = l.ln1 ? l.ln1 : '';
    const ln2 = l.ln2 ? l.ln2 : '';
    const prefix = l.type === 'add' ? '+' : l.type === 'del' ? '-' : ' ';
    html += `<div class="diff-line ${l.type}"><span class="ln">${ln1}</span><span class="ln">${ln2}</span>${prefix} ${escapeHtml(l.text)}</div>`;
  }
  return html;
}


async function updateFuzzGames() {
  try {
    const fuzzEnabled = document.getElementById('fuzz-toggle').checked;
    const details = document.getElementById('fuzz-games-details');
    if (!fuzzEnabled) { details.style.display = 'none'; return; }
    const data = await fetchJson('/api/fuzz/recent');
    if (data.length === 0) { details.style.display = 'none'; return; }
    details.style.display = '';
    const list = document.getElementById('fuzz-games-list');
    list.innerHTML = data.map(r => {
      const status = r.status === 'pass'
        ? '<span style="color:var(--green)">PASS</span>'
        : r.status === 'fail'
        ? '<span style="color:var(--red)">FAIL</span>'
        : '<span style="color:var(--yellow)">ERR</span>';
      const d1 = r.deck1.length > 40 ? r.deck1.slice(0, 40) + '...' : r.deck1;
      const d2 = r.deck2.length > 40 ? r.deck2.slice(0, 40) + '...' : r.deck2;
      const div = r.first_divergence_field || '';
      return `<div style="padding:2px 0">#${r.id} ${status} seed=${r.seed} ${div ? '| ' + div : ''}</div>`;
    }).join('');
  } catch(e) { console.error('Fuzz games error:', e); }
}

async function refresh() {
  await Promise.all([
    updateStats(), updateTrend(), updateMatrix(),
    updateFailures(), updateClusters(),
    updateConfig(), updateAnalysisStatus(),
    updateLogs(), updateFuzzGames()
  ]);
}

refresh();
setInterval(refresh, 10000);

setInterval(updateLogs, 2000);
