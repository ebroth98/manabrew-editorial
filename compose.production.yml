services:
  manabrew:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_RELAY_HOST: relay.manabrew.app
        VITE_RELAY_PORT: "443"
        VITE_RELAY_PASSWORD: ${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}
        VITE_MANAGED_RELAY: "1"
        VITE_SCRYFALL_SYMBOL_BASE: /scryfall-symbols/
        # Off by default: "Play vs AI" runs the engine client-side, so the web
        # does NOT depend on the self-hosted-node. Build with
        # VITE_HOSTED_AI_ENABLED=true (and run the node via --profile hosted-ai)
        # to expose the Settings engine toggle.
        VITE_HOSTED_AI_ENABLED: "${VITE_HOSTED_AI_ENABLED:-false}"
        VITE_HUB_API_URL: "${VITE_HUB_API_URL:-https://api.manabrew.app}"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./ops/status.json:/srv/manabrew/status.json:ro
      - ./ops/manifest.json:/srv/manabrew/manifest.json:ro
      - ./ops/sidestore:/srv/manabrew/sidestore:ro
      - caddy-data:/data
      - caddy-config:/config
    # Bcrypt hash for the push./loki. ingress (single-quote in secrets — contains `$`).
    # Unset on the host stays unset here, so the Caddyfile's locked fallback applies.
    environment:
      PUSHGATEWAY_PASSWORD_HASH:
      # Bcrypt hash for the api. /admin/* ingress (same single-quote caveat).
      HUB_ADMIN_PASSWORD_HASH:
    # No depends_on for manabrew-hub: the site must deploy/restart even if the
    # hub image is broken; caddy just 502s api. until the hub comes up.
    depends_on:
      - manabrew-server

  manabrew-server:
    # Explicit tag so deploy.sh can address the freshly built image when it
    # compares binaries to decide whether a restart is needed.
    image: manabrew-server:production
    build:
      context: .
      dockerfile: manabrew-rs/crates/manabrew-server/Dockerfile
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_HEALTH_PORT: "9444"
      FORGE_MAX_ROOMS: "100"
      MANABREW_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SECRET_MANABREW_KEY: "${SECRET_MANABREW_KEY:-}"
      RUST_LOG: "manabrew_server=info"
      # Events + captures live on the host filesystem, never a container layer.
      MANABREW_EVENTS_DIR: "/var/manabrew/events"
      MANABREW_GAME_CAPTURE_DIR: "/var/manabrew/captures"
      MANABREW_GAME_CAPTURE_MAX_GB: "${MANABREW_GAME_CAPTURE_MAX_GB:-20}"
    volumes:
      - ./ops/observability/data/events:/var/manabrew/events
      - ./ops/observability/data/captures:/var/manabrew/captures
    expose:
      - "9443"
      - "9444"
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9444/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  manabrew-hub:
    image: manabrew-hub:production
    build:
      context: .
      dockerfile: manabrew-rs/crates/manabrew-hub/Dockerfile
    environment:
      HUB_HOST: "0.0.0.0"
      HUB_PORT: "9500"
      # hub.db on the host filesystem so it rides the existing restic backups.
      HUB_DB_PATH: "/var/manabrew/hub/hub.db"
      EVENTS_DB_PATH: "/var/manabrew/events/events.db"
      RUST_LOG: "manabrew_hub=info"
    volumes:
      - ./ops/hub-data:/var/manabrew/hub
      - ./ops/observability/data/events:/var/manabrew/events:ro
    expose:
      - "9500"
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9500/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Headless engine node hosting a room for web "Play vs AI". Opt-in: the
  # default deploy doesn't build/run it (Play-vs-AI works client-side). Start
  # it with `docker compose --profile hosted-ai up` (and build the web with
  # VITE_HOSTED_AI_ENABLED=true). Its room is `hosted`, so it never appears in
  # the human lobby browse list — the node can stay live without advertising.
  self-hosted-node:
    profiles:
      - hosted-ai
    build:
      context: .
      dockerfile: manabrew-rs/crates/self-hosted-node/Dockerfile
    environment:
      SELF_HOSTED_NODE_RELAY_URL: "ws://manabrew-server:9443"
      SELF_HOSTED_NODE_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SELF_HOSTED_NODE_FORMAT: "${SELF_HOSTED_NODE_FORMAT:-commander}"
      SELF_HOSTED_NODE_MAX_PLAYERS: "${SELF_HOSTED_NODE_MAX_PLAYERS:-2}"
      SELF_HOSTED_NODE_METRICS_PUSH_URL: "${SELF_HOSTED_NODE_METRICS_PUSH_URL:-}"
      RUST_LOG: "self_hosted_node=info"
    depends_on:
      - manabrew-server
    restart: unless-stopped

  # ── Observability stack — opt-in via COMPOSE_PROFILES=observability ──
  # (images pulled, never built; config under ops/observability/)
  prometheus:
    profiles:
      - observability
    image: prom/prometheus:v3.4.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./ops/observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    restart: unless-stopped
    mem_limit: 512m

  # Remote nodes push here via push.manabrew.app; stale pushes = fleet-down alert.
  pushgateway:
    profiles:
      - observability
    image: prom/pushgateway:v1.11.1
    # image runs as nobody, but the fresh named volume is root-owned
    user: root
    command:
      - --persistence.file=/data/pushgateway.dat
      - --persistence.interval=5m
    volumes:
      - pushgateway-data:/data
    expose:
      - "9091"
    restart: unless-stopped
    mem_limit: 64m

  grafana:
    profiles:
      - observability
    image: grafana/grafana:11.6.1
    environment:
      GF_SERVER_ROOT_URL: "https://grafana.manabrew.app"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "frser-sqlite-datasource"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-https://discord.invalid/webhook-not-configured}"
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./ops/observability/data/events:/var/manabrew/events:ro
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    restart: unless-stopped
    mem_limit: 384m

  loki:
    profiles:
      - observability
    image: grafana/loki:3.5.0
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./ops/observability/loki:/etc/loki:ro
      - loki-data:/loki
    expose:
      - "3100"
    restart: unless-stopped
    mem_limit: 384m

  events-ingester:
    profiles:
      - observability
    image: python:3.12-alpine
    command:
      - python
      - /app/ingest-events.py
      - --dir
      - /var/manabrew/events
      - --watch
      - "300"
    volumes:
      - ./scripts/ingest-events.py:/app/ingest-events.py:ro
      - ./ops/observability/data/events:/var/manabrew/events
    restart: unless-stopped
    mem_limit: 64m

  alloy:
    profiles:
      - observability
    image: grafana/alloy:v1.9.1
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./ops/observability/alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    restart: unless-stopped
    mem_limit: 128m

volumes:
  caddy-data:
  caddy-config:
  prometheus-data:
  pushgateway-data:
  grafana-data:
  loki-data:
  alloy-data:
