services:
  manabrew:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_RELAY_HOST: relay.manabrew.app
        VITE_RELAY_PORT: "443"
        VITE_RELAY_PASSWORD: ${FORGE_SERVER_KEY:?FORGE_SERVER_KEY is required}
        VITE_MANAGED_RELAY: "1"
        VITE_SCRYFALL_SYMBOL_BASE: /scryfall-symbols/
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - forge-server

  forge-server:
    build:
      context: .
      dockerfile: forge-engine/crates/forge-server/Dockerfile
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_MAX_ROOMS: "100"
      FORGE_SERVER_KEY: "${FORGE_SERVER_KEY:?FORGE_SERVER_KEY is required}"
      RUST_LOG: "forge_server=info"
    expose:
      - "9443"
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
