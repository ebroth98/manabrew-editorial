services:
  manabrew:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_RELAY_HOST: relay.manabrew.app
        VITE_RELAY_PORT: "443"
        VITE_RELAY_PASSWORD: ${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}
        VITE_MANAGED_RELAY: "1"
        VITE_SCRYFALL_SYMBOL_BASE: /scryfall-symbols/
        # Off by default: "Play vs AI" runs the engine client-side, so the web
        # does NOT depend on the self-hosted-node. Build with
        # VITE_HOSTED_AI_ENABLED=true (and run the node via --profile hosted-ai)
        # to expose the Settings engine toggle.
        VITE_HOSTED_AI_ENABLED: "${VITE_HOSTED_AI_ENABLED:-false}"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./ops/status.json:/srv/manabrew/status.json:ro
      - ./ops/manifest.json:/srv/manabrew/manifest.json:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - manabrew-server

  manabrew-server:
    # Explicit tag so deploy.sh can address the freshly built image when it
    # compares binaries to decide whether a restart is needed.
    image: manabrew-server:production
    build:
      context: .
      dockerfile: manabrew-rs/crates/manabrew-server/Dockerfile
    environment:
      FORGE_HOST: "0.0.0.0"
      FORGE_PORT: "9443"
      FORGE_HEALTH_PORT: "9444"
      FORGE_MAX_ROOMS: "100"
      MANABREW_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SECRET_MANABREW_KEY: "${SECRET_MANABREW_KEY:-}"
      RUST_LOG: "manabrew_server=info"
    expose:
      - "9443"
      - "9444"
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.5
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9444/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Headless engine node hosting a room for web "Play vs AI". Opt-in: the
  # default deploy doesn't build/run it (Play-vs-AI works client-side). Start
  # it with `docker compose --profile hosted-ai up` (and build the web with
  # VITE_HOSTED_AI_ENABLED=true). Its room is `hosted`, so it never appears in
  # the human lobby browse list — the node can stay live without advertising.
  self-hosted-node:
    profiles:
      - hosted-ai
    build:
      context: .
      dockerfile: manabrew-rs/crates/self-hosted-node/Dockerfile
    environment:
      SELF_HOSTED_NODE_RELAY_URL: "ws://manabrew-server:9443"
      SELF_HOSTED_NODE_SERVER_KEY: "${MANABREW_SERVER_KEY:?MANABREW_SERVER_KEY is required}"
      SELF_HOSTED_NODE_FORMAT: "${SELF_HOSTED_NODE_FORMAT:-commander}"
      SELF_HOSTED_NODE_MAX_PLAYERS: "${SELF_HOSTED_NODE_MAX_PLAYERS:-2}"
      RUST_LOG: "self_hosted_node=info"
    depends_on:
      - manabrew-server
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
